// ═══════ THREE.JS ═══════
const wrap=document.getElementById("canvas-wrap"),W=wrap.clientWidth,H=wrap.clientHeight;
const scene=new THREE.Scene();scene.background=new THREE.Color(0x06080d);
const camera=new THREE.PerspectiveCamera(50,W/H,.5,80);camera.position.set(0,12,30);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
wrap.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0x334455,.6));
scene.add(new THREE.DirectionalLight(0xffffff,.8)).position.set(5,15,10);
const grid=new THREE.GridHelper(36,24,0x1a2a3a,0x0a0f15);grid.position.y=-5;scene.add(grid);

// Stars background
const starsGeom=new THREE.BufferGeometry();
const starPos=new Float32Array(400*3);
for(let i=0;i<400*3;i+=3){starPos[i]=(Math.random()-.5)*50;starPos[i+1]=(Math.random()-.5)*30;starPos[i+2]=(Math.random()-.5)*40}
starsGeom.setAttribute("position",new THREE.BufferAttribute(starPos,3));
scene.add(new THREE.Points(starsGeom,new THREE.PointsMaterial({color:0x334466,size:.05})));

function mkNode(x,y,z,color,size,type){
  const g=new THREE.Group();
  const geom=type==="cond"?new THREE.SphereGeometry(size,12,12):type==="stat"?new THREE.CylinderGeometry(size,size,size*2,8):new THREE.BoxGeometry(size*1.5,size*1.5,size*1.5);
  const mat=new THREE.MeshStandardMaterial({color,roughness:.2,metalness:.4,emissive:color,emissiveIntensity:.12});
  g.add(new THREE.Mesh(geom,mat));
  if(type==="cond"){const r=new THREE.Mesh(new THREE.TorusGeometry(size*1.3,.02,8,12),new THREE.MeshBasicMaterial({color}));r.rotation.x=Math.PI/2;g.add(r)}
  g.position.set(x,y,z);return g;
}

const allNodes=[],cNodes=[],aNodes=[],sNodes=[];

// Conditions — helix
CONDITIONS.forEach((c,i)=>{
  const a=(i/CONDITIONS.length)*Math.PI*5,r=14+Math.sin(i*.4)*2;
  const y=-2+(i/CONDITIONS.length)*10,x=Math.cos(a)*r,z=Math.sin(a)*r;
  const n=mkNode(x,y,z,new THREE.Color(catCol[c.cat]||"#a371f7"),.32,"cond");
  n.userData={label:c.id+" "+c.name,color:catCol[c.cat],desc:"触发: "+(c.links||[]).join(" "),links:c.links};
  scene.add(n);cNodes.push(n);allNodes.push(n);
});

// Actions — flat plane
ACTIONS.forEach((a,i)=>{
  const n=mkNode(a.x*.85,a.z>0?-4.5:-4.5,a.z*.85,new THREE.Color(catCol[a.cat]||"#00d4aa"),.28,"act");
  n.userData={label:a.id+" "+a.name,color:catCol[a.cat],desc:a.desc,st:a.st};
  scene.add(n);aNodes.push(n);allNodes.push(n);
});

// Stations — ground
STATIONS.forEach((s,i)=>{
  const n=mkNode(s.x*.85,-5.5,s.z*.85,new THREE.Color(zCol[s.zid]||0xf0a500),.2,"stat");
  n.userData={label:s.id+" "+s.name,zid:s.zid};
  scene.add(n);sNodes.push(n);allNodes.push(n);
});

// Lines — cond → action
CONDITIONS.forEach(c=>{
  const cn=cNodes.find(n=>n.userData.label.startsWith(c.id));
  if(!cn||!c.links)return;
  c.links.forEach(aid=>{
    const an=aNodes.find(n=>n.userData.label.startsWith(aid));
    if(!an)return;
    const g=new THREE.BufferGeometry().setFromPoints([cn.position,an.position]);
    scene.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:new THREE.Color(catCol[c.cat]||"#a371f7"),opacity:.12,transparent:true})));
  });
});

// ═══════ Camera ═══════
let drag=false,prev={x:0,y:0},ct=Math.PI/4,cp=.8,cd=30;
function uc(){
  camera.position.set(cd*Math.sin(cp)*Math.cos(ct),cd*Math.cos(cp),cd*Math.sin(cp)*Math.sin(ct));
  camera.lookAt(0,0,0);
}
wrap.addEventListener("mousedown",e=>{if(e.button===0){drag=true;prev={x:e.clientX,y:e.clientY}}});
wrap.addEventListener("mousemove",e=>{if(!drag)return;ct+=(e.clientX-prev.x)*.004;cp=Math.max(.2,Math.min(1.5,cp-(e.clientY-prev.y)*.004));prev={x:e.clientX,y:e.clientY};uc()});
wrap.addEventListener("mouseup",()=>drag=false);
wrap.addEventListener("wheel",e=>{e.preventDefault();cd=Math.max(10,Math.min(50,cd+e.deltaY*.03));uc()},{passive:false});
wrap.addEventListener("touchstart",e=>{if(e.touches.length===1){drag=true;prev={x:e.touches[0].clientX,y:e.touches[0].clientY}}});
wrap.addEventListener("touchmove",e=>{if(!drag||e.touches.length!==1)return;ct+=(e.touches[0].clientX-prev.x)*.004;cp=Math.max(.2,Math.min(1.5,cp-(e.touches[0].clientY-prev.y)*.004));prev={x:e.touches[0].clientX,y:e.touches[0].clientY};uc()});
wrap.addEventListener("touchend",()=>drag=false);

// ═══════ Click ═══════
const rc=new THREE.Raycaster(),ms=new THREE.Vector2();
wrap.addEventListener("click",e=>{
  ms.x=(e.clientX/wrap.clientWidth)*2-1;ms.y=-(e.clientY/wrap.clientHeight)*2+1;
  rc.setFromCamera(ms,camera);
  const hits=rc.intersectObjects(allNodes,true);
  if(hits.length>0){
    let o=hits[0].object;while(o&&!o.userData.label)o=o.parent;
    if(o&&o.userData.label){
      const d=o.userData,t=document.getElementById("tip");
      let ex="";if(d.links)ex="→ "+d.links.join(" ");if(d.st)ex+=" · 工位:"+d.st;if(d.zid)ex=" · 区域:"+d.zid;
      t.innerHTML=`<b style="color:${d.color||"#00d4aa"}">${d.label}</b><br><span style="color:#8b949e">${d.desc||""} ${ex}</span>`;
      t.style.display="block";t.style.left=(e.clientX+15)+"px";t.style.top=(e.clientY-10)+"px";
      setTimeout(()=>t.style.display="none",3000);
    }
  }
});

// ═══════ Animate ═══════
let time=0;
function anim(){
  requestAnimationFrame(anim);time+=.016;
  cNodes.forEach((n,i)=>{n.rotation.y+=.002;n.rotation.x+=.001;if(n.children[1])n.children[1].rotation.z+=.004});
  aNodes.forEach((n,i)=>{n.scale.setScalar(1+Math.sin(time*2+i)*.06)});
  renderer.render(scene,camera);
}
anim();
window.addEventListener("resize",()=>{renderer.setSize(wrap.clientWidth,wrap.clientHeight);camera.aspect=wrap.clientWidth/wrap.clientHeight;camera.updateProjectionMatrix()});
</script>
</body>
</html>
