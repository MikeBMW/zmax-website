<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>储翰光模块产线 · 轨道机器人场景 | Z-MAX</title>
<style>
:root{--bg:#06080d;--panel:#0d1117;--border:#1a1f2b;--accent:#00d4aa;--text:#c8d1d9;--muted:#8b949e;--dim:#484f58}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#bar{background:var(--panel);padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:10;flex-wrap:wrap}
#bar h1{font-size:14px;color:var(--accent);white-space:nowrap}
#bar .tabs{display:flex;gap:0}
#bar .tab{padding:5px 10px;font-size:10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer}
#bar .tab:first-child{border-radius:5px 0 0 5px}
#bar .tab:last-child{border-radius:0 5px 5px 0}
#bar .tab.active{background:#0d3320;color:var(--accent);border-color:#00d4aa44}
#bar a{font-size:10px;color:var(--dim);border:1px solid var(--border);border-radius:4px;padding:3px 8px;text-decoration:none}
.badge{font-size:9px;padding:2px 6px;border-radius:3px;white-space:nowrap}
.badge-ok{background:#0d3320;color:#3fb950;border:1px solid #3fb95033}
.badge-warn{background:#332010;color:#f0a500;border:1px solid #f0a50033}

#main{flex:1;display:flex;overflow:hidden}

/* 3D view */
#view3d{flex:1;position:relative;cursor:grab;min-width:0}
#view3d:active{cursor:grabbing}
#view3d canvas{display:block}

#specs-overlay{position:absolute;top:10px;left:10px;z-index:5;background:rgba(13,17,23,.9);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:10px}
#specs-overlay .row{display:flex;gap:10px;margin:2px 0}
#specs-overlay .k{color:var(--muted);min-width:70px}
#specs-overlay .v{color:var(--accent);font-weight:700}

#dock{position:absolute;bottom:0;left:0;right:0;background:rgba(13,17,23,.96);border-top:1px solid var(--border);display:flex;gap:0;overflow-x:auto;z-index:5;padding:4px 8px}
#dock .ds{flex:1;min-width:60px;text-align:center;padding:5px 2px;cursor:pointer;border-radius:5px;font-size:9px;border:1px solid transparent;transition:all .15s}
#dock .ds:hover{background:#111827}
#dock .ds.active{background:#0d3320;border-color:#00d4aa44}
#dock .ds .di{font-size:14px;display:block}
#dock .ds .dn{font-weight:600}
#dock .ds .dt{color:var(--dim);font-size:8px}

/* Right panel */
#panel{width:370px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
@media(max-width:1000px){#panel{display:none;position:absolute;right:0;top:50px;bottom:0;z-index:20;width:320px}
  #panel.open{display:flex}}
#panel-toggle{display:none;position:fixed;right:8px;top:54px;z-index:21;background:var(--panel);border:1px solid var(--accent);color:var(--accent);padding:4px 8px;border-radius:4px;font-size:11px}
@media(max-width:1000px){#panel-toggle{display:block}}

#panel h3{font-size:12px;color:var(--accent);padding:10px 14px 4px;border-bottom:1px solid var(--border);margin-bottom:4px}

/* Flow bar */
.flow-bar{display:flex;align-items:center;gap:0;padding:6px 10px;overflow-x:auto;border-bottom:1px solid var(--border)}
.flow-step{flex:1;min-width:50px;text-align:center;padding:4px 2px;font-size:9px}
.flow-step .icon{font-size:16px;display:block}
.flow-step .label{color:var(--text);font-weight:600;font-size:9px}
.flow-step .time{color:var(--dim);font-size:8px}
.flow-arrow{color:var(--border);font-size:12px;flex-shrink:0}

/* Station cards */
.station{background:#111827;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin:6px 10px;transition:all .2s;cursor:pointer}
.station:hover{border-color:#00d4aa44}
.station.active{border-color:var(--accent);box-shadow:0 0 8px rgba(0,212,170,.08)}
.station .st-header{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.station .st-num{min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000}
.station .st-name{font-size:12px;font-weight:700}
.station .st-section{font-size:9px;color:var(--dim)}
.station .st-desc{font-size:10px;color:var(--muted);line-height:1.4;margin:4px 0}
.station .st-specs{display:flex;gap:6px;flex-wrap:wrap}
.station .st-spec{background:rgba(0,0,0,.3);border-radius:4px;padding:4px 8px;text-align:center;font-size:10px}
.station .st-spec .sv{font-weight:700;color:#3fb950}
.station .st-spec .sl{font-size:8px;color:var(--dim)}
.station .st-reqs{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;font-size:9px;color:var(--dim)}
.station .st-req{display:flex;align-items:center;gap:2px}
.station .st-req .dot{width:5px;height:5px;border-radius:3px}
.dot-ok{background:#3fb950}.dot-warn{background:#f0a500}.dot-crit{background:#ff4444}

/* Robot specs section */
.sp-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px 10px}
.sp-item{background:#111827;border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center}
.sp-item .val{font-size:14px;font-weight:700;color:var(--accent)}
.sp-item .lab{font-size:8px;color:var(--dim)}

.legend-row{display:flex;gap:10px;flex-wrap:wrap;padding:6px 10px;font-size:9px;color:var(--muted)}
.legend-row span{display:flex;align-items:center;gap:3px}
.legend-dot{width:7px;height:7px;border-radius:4px}
</style>
</head>

function createStation(x,color,w){
  const g=new THREE.Group();const s=w||.7;
  g.add(new THREE.Mesh(new THREE.BoxGeometry(s,.3,.65),new THREE.MeshStandardMaterial({color:0x1a1a2e,roughness:.6}))).position.y=.15;
  g.children[0].castShadow=g.children[0].receiveShadow=true;
  g.add(new THREE.Mesh(new THREE.BoxGeometry(s-.1,.6,.45),new THREE.MeshStandardMaterial({color,roughness:.25,metalness:.4,emissive:color,emissiveIntensity:.12})));
  g.children[1].position.y=.55;g.children[1].castShadow=true;
  g.add(new THREE.Mesh(new THREE.BoxGeometry(s-.2,.04,.25),new THREE.MeshStandardMaterial({color:0x334455,metalness:.6,roughness:.2}))).position.set(0,.28,.42);
  g.add(new THREE.Mesh(new THREE.BoxGeometry(.3,.17,.02),new THREE.MeshBasicMaterial({color:0x002233}))).position.set(0,.62,.24);
  g.add(new THREE.Mesh(new THREE.SphereGeometry(.045),new THREE.MeshBasicMaterial({color}))).position.set(.25,.88,.18);
  const cb=new THREE.Mesh(new THREE.CylinderGeometry(.02,.02,3.5,6),new THREE.MeshStandardMaterial({color:0x2a3040}));
  cb.rotation.x=Math.PI/2;cb.position.set(0,.08,1.75);g.add(cb);
  g.position.set(x,0,-3.5);
  return g;
}

function createRobot(){
  const g=new THREE.Group();const bc=0x8899aa,ac=0x00d4aa;
  g.add(new THREE.Mesh(new THREE.BoxGeometry(.75,.35,.55),new THREE.MeshStandardMaterial({color:bc,metalness:.3,roughness:.35}))).position.y=.32;
  g.children[0].castShadow=true;
  g.add(new THREE.Mesh(new THREE.BoxGeometry(.45,.7,.35),new THREE.MeshStandardMaterial({color:bc,metalness:.35,roughness:.3})));
  g.children[1].position.y=.88;g.children[1].castShadow=true;
  g.add(new THREE.Mesh(new THREE.BoxGeometry(.48,.07,.37),new THREE.MeshStandardMaterial({color:ac,emissive:ac,emissiveIntensity:.4})));
  g.children[2].position.y=.72;
  g.add(new THREE.Mesh(new THREE.BoxGeometry(.28,.22,.2),new THREE.MeshStandardMaterial({color:bc,metalness:.3})));
  g.children[3].position.y=1.38;g.children[3].castShadow=true;
  g.add(new THREE.Mesh(new THREE.BoxGeometry(.18,.12,.02),new THREE.MeshBasicMaterial({color:0x001a2a}))).position.set(0,1.38,.11);
  const em=new THREE.MeshBasicMaterial({color:ac});
  g.add(new THREE.Mesh(new THREE.SphereGeometry(.035),em)).position.set(-.05,1.42,.11);
  g.add(new THREE.Mesh(new THREE.SphereGeometry(.035),em)).position.set(.05,1.42,.11);
  const armG=new THREE.Group();armG.position.set(.28,1.0,0);armG.rotation.z=-.4;
  armG.add(new THREE.Mesh(new THREE.CylinderGeometry(.05,.04,.55,8),new THREE.MeshStandardMaterial({color:bc,metalness:.4})));
  armG.children[0].position.y=-.08;
  armG.add(new THREE.Mesh(new THREE.CylinderGeometry(.04,.035,.45,8),new THREE.MeshStandardMaterial({color:bc,metalness:.4})));
  armG.children[1].position.y=-.55;armG.children[1].rotation.z=.15;
  const gripM=new THREE.MeshStandardMaterial({color:ac,emissive:ac,emissiveIntensity:.5,roughness:.1});
  armG.add(new THREE.Mesh(new THREE.BoxGeometry(.07,.15,.05),gripM)).position.y=-.78;
  for(let s of[-1,1]) armG.add(new THREE.Mesh(new THREE.BoxGeometry(.025,.07,.015),gripM)).position.set(s*.025,-.88,.015);
  g.add(armG);
  for(let sx of[-.25,.25]){
    const w=new THREE.Mesh(new THREE.CylinderGeometry(.09,.09,.05,16),new THREE.MeshStandardMaterial({color:0x222,roughness:.8}));
    w.rotation.z=Math.PI/2;w.position.set(sx,.09,.2);g.add(w);
    const w2=w.clone();w2.position.z=-.2;g.add(w2);
  }
  g.position.set(-18,.08,.5);
  return g;
}

// ═══════ Build ═══════
function buildLine(idx){
  stationObjects.forEach(s=>scene.remove(s));stationObjects=[];
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",i===idx));
  
  const line=LINES[idx];
  allStations=[];
  line.sections.forEach(sec=>{sec.stations.forEach(st=>{allStations.push({...st,color:sec.color,sectionName:sec.name})})});
  
  const total=allStations.length,spacing=total>12?38/total:3;
  allStations.forEach((st,i)=>{
    const x=-18+i*spacing;
    const s=createStation(x,st.color,total>12?.6:.8);
    s.userData={...st,index:i};scene.add(s);stationObjects.push(s);
  });
  
  if(!robotObj){robotObj=createRobot();scene.add(robotObj)}
  focusedStation=0;robotTargetX=-18;robotPosX=-18;robotObj.position.x=-18;
  
  buildFlowBar(line);
  buildDock();
  buildStationCards();
  focusStation(0);
}

function buildFlowBar(line){
  let h="",si=0;
  line.sections.forEach(sec=>{
    sec.stations.forEach(st=>{
      h+=`<div class="flow-step"><span class="icon">${st.label.slice(0,2)}</span><span class="label">${st.label.slice(3)}</span><span class="time">${st.specs?.[0]?.[0]||""}</span></div>`;
      si++;
      if(si<line.sections.reduce((s,sec)=>s+sec.stations.length,0)) h+='<span class="flow-arrow">→</span>';
    });
  });
  document.getElementById("flow-bar").innerHTML=h;
}

function buildDock(){
  let h="";
  allStations.forEach((st,i)=>{
    h+=`<div class="ds" onclick="focusStation(${i})" id="ds${i}">
      <span class="di">${st.label.slice(0,2)}</span><span class="dn">${st.label.slice(3)}</span><span class="dt">${st.specs?.[0]?.[0]||""}</span>
    </div>`;
  });
  document.getElementById("dock").innerHTML=h;
}

function buildStationCards(){
  let h="";
  allStations.forEach((st,i)=>{
    const reqsH=st.reqs.map(r=>`<span class="st-req"><span class="dot dot-${r[1]}"></span>${r[0]}</span>`).join("");
    const specsH=st.specs.map(s=>`<span class="st-spec"><span class="sv">${s[0]}</span><span class="sl">${s[1]}</span></span>`).join("");
    h+=`<div class="station" id="card${i}" onclick="focusStation(${i})">
      <div class="st-header">
        <span class="st-num" style="background:${'#'+st.color.toString(16).padStart(6,'0')}">${i+1}</span>
        <span class="st-name">${st.id} ${st.label}</span>
      </div>
      <div class="st-section">${st.sectionName}</div>
      <div class="st-desc">${st.desc}</div>
      <div class="st-specs">${specsH}</div>
      <div class="st-reqs">${reqsH}</div>
    </div>`;
  });
  document.getElementById("stations-list").innerHTML=h;
}

function focusStation(idx){
  focusedStation=idx;
  const s=stationObjects[idx];
  if(!s)return;
  robotTargetX=s.position.x;
  document.querySelectorAll(".ds").forEach((d,i)=>d.classList.toggle("active",i===idx));
  document.querySelectorAll(".station").forEach((c,i)=>c.classList.toggle("active",i===idx));
  const card=document.getElementById("card"+idx);
  if(card) card.scrollIntoView({behavior:"smooth",block:"center"});
}

function switchLine(idx){currentLine=idx;buildLine(idx)}

// ═══════ Camera ═══════
let dragging=false,prev={x:0,y:0},camTheta=0,camPhi=.5,camDist=20,target={x:0,y:1,z:-1.5};
function updateCam(){
  camera.position.x=target.x+camDist*Math.sin(camPhi)*Math.cos(camTheta);
  camera.position.y=target.y+camDist*Math.cos(camPhi);
  camera.position.z=target.z+camDist*Math.sin(camPhi)*Math.sin(camTheta);
  camera.lookAt(target.x,target.y,target.z);
}
wrap3d.addEventListener("mousedown",e=>{dragging=true;prev={x:e.clientX,y:e.clientY}});
wrap3d.addEventListener("mousemove",e=>{if(!dragging)return;camTheta-=(e.clientX-prev.x)*.005;camPhi=Math.max(.1,Math.min(1.4,camPhi-(e.clientY-prev.y)*.005));prev={x:e.clientX,y:e.clientY};updateCam()});
wrap3d.addEventListener("mouseup",()=>dragging=false);
wrap3d.addEventListener("wheel",e=>{camDist=Math.max(5,Math.min(38,camDist+e.deltaY*.02));updateCam()});
wrap3d.addEventListener("touchstart",e=>{if(e.touches.length===1){dragging=true;prev={x:e.touches[0].clientX,y:e.touches[0].clientY}}});
wrap3d.addEventListener("touchmove",e=>{if(!dragging||e.touches.length!==1)return;camTheta-=(e.touches[0].clientX-prev.x)*.005;camPhi=Math.max(.1,Math.min(1.4,camPhi-(e.touches[0].clientY-prev.y)*.005));prev={x:e.touches[0].clientX,y:e.touches[0].clientY};updateCam()});
wrap3d.addEventListener("touchend",()=>dragging=false);

// ═══════ Animation ═══════
let time=0;
function animate(){
  requestAnimationFrame(animate);time+=.016;
  const dx=robotTargetX-robotPosX;
  if(Math.abs(dx)>.02) robotPosX+=dx*.06;
  robotObj.position.x=robotPosX;
  robotObj.position.y=.08+Math.sin(time*2.5)*.025;
  stationObjects.forEach(s=>{const lt=s.children[4];if(lt)lt.scale.setScalar(1+Math.sin(time*3+s.position.x)*.18)});
  renderer.render(scene,camera);
}

buildLine(0);updateCam();animate();
setInterval(()=>{if(stationObjects.length>0){focusedStation=(focusedStation+1)%stationObjects.length;focusStation(focusedStation)}},6000);

window.addEventListener("resize",()=>{
  renderer.setSize(wrap3d.clientWidth,wrap3d.clientHeight);
  camera.aspect=wrap3d.clientWidth/wrap3d.clientHeight;camera.updateProjectionMatrix();
});
</script>
</body>
