<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>用户需求调研 · Z-MAX</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#06080d;color:#c8d1d9;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:900px;margin:0 auto;padding:60px 24px}

  h1{font-size:36px;font-weight:900;color:#00d4aa;text-align:center;margin-bottom:6px}
  .sub{text-align:center;color:#8b949e;font-size:15px;margin-bottom:40px}
  .hero-tag{display:inline-block;padding:4px 14px;border:1px solid #00d4aa44;border-radius:50px;color:#00d4aa;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}

  .section{background:#0d1117;border:1px solid #1a1f2b;border-radius:12px;padding:28px;margin-bottom:20px}
  .section h2{font-size:18px;color:#00d4aa;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #1a1f2b}
  .section h3{font-size:15px;color:#e6edf3;margin:16px 0 8px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px}
  @media(max-width:640px){.grid{grid-template-columns:1fr}}

  .field{margin-bottom:8px}
  .field label{display:block;font-size:13px;color:#e6edf3;margin-bottom:4px;font-weight:500}
  .field label span{color:#8b949e;font-weight:400;font-size:12px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;background:#06080d;border:1px solid #1a1f2b;border-radius:6px;color:#c8d1d9;font-size:13px;font-family:inherit;transition:border-color .2s}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#00d4aa}
  .field textarea{resize:vertical;min-height:80px}
  .checkbox-group{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:4px}
  .checkbox-group label{display:flex;align-items:center;gap:6px;font-size:13px;color:#c8d1d9;cursor:pointer;font-weight:400}
  .checkbox-group input[type=checkbox]{accent-color:#00d4aa;width:auto}

  .btn{display:block;width:100%;padding:14px;background:#00d4aa;color:#06080d;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-top:24px;transition:all .25s}
  .btn:hover{background:#00ffcc;transform:translateY(-2px);box-shadow:0 8px 30px #00d4aa33}

  .download-box{text-align:center;padding:32px;background:#0d1117;border:1px dashed #00d4aa44;border-radius:12px;margin-bottom:40px}
  .download-box p{color:#8b949e;font-size:14px;margin-bottom:12px}
  .dl-btn{display:inline-block;padding:10px 28px;border:1.5px solid #00d4aa;color:#00d4aa;border-radius:6px;text-decoration:none;font-weight:600;font-size:14px;transition:all .2s}
  .dl-btn:hover{background:#00d4aa22}

  .note{text-align:center;color:#484f58;font-size:12px;margin-top:20px}
  .note a{color:#8b949e}
</style>
</head>
<body>
<div class="wrap">

<div style="text-align:center">
  <div class="hero-tag">Z-MAX v1.0.4</div>
  <h1>用户需求调研</h1>
  <p class="sub">请填写以下信息，Z-MAX团队将在3个工作日内为您提供定制化解决方案与ROI分析</p>
</div>

<!-- 下载区 -->
<div class="download-box">
  <p>📥 如需线下填写，可下载 Word 版问卷：</p>
  <a href="/survey.docx" class="dl-btn">下载 .docx 问卷</a>
</div>

<form id="survey">
<!-- 一、基本信息 -->
<div class="section">
  <h2>一、客户基本信息</h2>
  <div class="grid">
    <div class="field"><label>公司/单位名称 <span>*</span></label><input type="text" name="company" required></div>
    <div class="field"><label>所属行业</label><select name="industry"><option value="">请选择</option><option>光模块制造</option><option>光通信设备</option><option>半导体封装</option><option>电子代工</option><option>其他</option></select></div>
    <div class="field"><label>公司规模</label><select name="scale"><option value="">请选择</option><option><100人</option><option>100-500人</option><option>500-2000人</option><option>>2000人</option></select></div>
    <div class="field"><label>现有自动化程度</label><select name="auto_level"><option value="">请选择</option><option>全人工</option><option>半自动</option><option>单机自动化</option><option>产线自动化</option></select></div>
    <div class="field"><label>联系人</label><input type="text" name="contact"></div>
    <div class="field"><label>联系电话</label><input type="tel" name="phone"></div>
    <div class="field" style="grid-column:span 2"><label>邮箱 <span>*</span></label><input type="email" name="email" required></div>
  </div>
</div>

<!-- 二、产线现状 -->
<div class="section">
  <h2>二、产线现状</h2>
  <div class="grid">
    <div class="field"><label>产线类型</label><select name="line_type"><option value="">请选择</option><option>EVB测试线</option><option>模块组装线</option><option>老化测试线</option><option>成品检测线</option><option>其他</option></select></div>
    <div class="field"><label>日产能（模块数）</label><select name="capacity"><option value="">请选择</option><option><1000</option><option>1000-5000</option><option>5000-20000</option><option>>20000</option></select></div>
    <div class="field"><label>班次制度</label><select name="shift"><option value="">请选择</option><option>单班(8h)</option><option>双班(16h)</option><option>三班(24h)</option></select></div>
    <div class="field"><label>当前关键工序良率</label><select name="yield"><option value="">请选择</option><option><95%</option><option>95%-97%</option><option>97%-99%</option><option>>99%</option></select></div>
    <div class="field" style="grid-column:span 2">
      <label>主要痛点（可多选）</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="pain" value="force"> 插拔力度不可控</label>
        <label><input type="checkbox" name="pain" value="change"> 换型耗时长</label>
        <label><input type="checkbox" name="pain" value="space"> 测试仓空间狭小</label>
        <label><input type="checkbox" name="pain" value="error"> 人工误操作多</label>
        <label><input type="checkbox" name="pain" value="hire"> 招工困难</label>
        <label><input type="checkbox" name="pain" value="yield"> 良率波动大</label>
      </div>
    </div>
  </div>
</div>

<!-- 三、产品规格 -->
<div class="section">
  <h2>三、光模块产品规格</h2>
  <div class="grid">
    <div class="field"><label>光模块型号（可多填）</label><textarea name="module_models" placeholder="例：800G OSFP, 400G QSFP-DD..."></textarea></div>
    <div class="field"><label>封装类型</label><select name="package"><option value="">请选择</option><option>QSFP-DD</option><option>OSFP</option><option>SFP</option><option>CFP2</option><option>多型号混合</option></select></div>
    <div class="field"><label>传输速率</label><select name="speed"><option value="">请选择</option><option>100G</option><option>400G</option><option>800G</option><option>1.6T</option><option>多速率混合</option></select></div>
    <div class="field"><label>需要兼容的型号种类数</label><input type="text" name="variant_count" placeholder="例：3种"></div>
    <div class="field"><label>换型频次</label><select name="change_freq"><option value="">请选择</option><option>不换型</option><option>≤1次/天</option><option>2-5次/天</option><option>>5次/天</option></select></div>
  </div>
</div>

<!-- 四、技术要求 -->
<div class="section">
  <h2>四、技术要求</h2>
  <div class="grid">
    <div class="field"><label>插拔对准精度要求</label><select name="precision"><option value="">请选择</option><option>±0.1mm</option><option>±0.05mm</option><option>±0.02mm</option><option>±0.01mm</option></select></div>
    <div class="field"><label>单次操作节拍要求</label><select name="takt"><option value="">请选择</option><option><10s</option><option><8s</option><option><5s</option><option><3s</option></select></div>
    <div class="field"><label>关键工序良率目标</label><select name="yield_target"><option value="">请选择</option><option>≥97%</option><option>≥99%</option><option>≥99.5%</option><option>≥99.9%</option></select></div>
    <div class="field"><label>连续工作时长需求</label><select name="runtime"><option value="">请选择</option><option>8h</option><option>16h</option><option>24h(7×24)</option></select></div>
    <div class="field"><label>是否需要力控保护</label><select name="force_ctrl"><option value="">请选择</option><option>需要</option><option>不需要</option></select></div>
    <div class="field"><label>是否需要AOI检测</label><select name="aoi"><option value="">请选择</option><option>需要</option><option>不需要</option></select></div>
    <div class="field"><label>是否需要扫码追溯</label><select name="barcode"><option value="">请选择</option><option>需要</option><option>不需要</option></select></div>
    <div class="field"><label>ESD防护要求</label><select name="esd"><option value="">请选择</option><option>需要</option><option>不需要</option></select></div>
  </div>
</div>

<!-- 五、预算 -->
<div class="section">
  <h2>五、投资预算</h2>
  <div class="grid">
    <div class="field"><label>预算范围</label><select name="budget"><option value="">请选择</option><option><50万</option><option>50-100万</option><option>100-300万</option><option>300万+</option></select></div>
    <div class="field"><label>预期ROI回收期</label><select name="roi"><option value="">请选择</option><option><12月</option><option>12-24月</option><option>24-36月</option><option>无要求</option></select></div>
    <div class="field"><label>采购计划</label><select name="qty"><option value="">请选择</option><option>1台试点</option><option>2-5台</option><option>5-10台</option><option>10台以上</option></select></div>
    <div class="field"><label>决策周期</label><select name="decision"><option value="">请选择</option><option>1个月内</option><option>1-3个月</option><option>3-6个月</option><option>6个月以上</option></select></div>
  </div>
</div>

<!-- 六、其他 -->
<div class="section">
  <h2>六、补充说明</h2>
  <div class="field"><label>对自动化方案的期望和关注点</label><textarea name="expectation" placeholder="请描述您的核心期望..."></textarea></div>
  <div class="field"><label>是否希望参观Z-MAX演示</label><select name="demo"><option value="">请选择</option><option>是，希望尽快安排</option><option>暂不需要</option></select></div>
  <div class="field"><label>其他补充</label><textarea name="other" placeholder="任何其他信息..."></textarea></div>
</div>

<button type="submit" class="btn">提交需求调研</button>
<p class="note">提交即表示同意Z-MAX团队使用以上信息进行方案评估 · <a href="http://datadrive.world">返回首页</a></p>
</form>

</div>

<script>
document.getElementById('survey').addEventListener('submit', function(e){
  e.preventDefault();
  var fd = new FormData(this);
  var data = {};
  fd.forEach(function(v,k){ data[k]=v; });
  alert('✅ 收到！\n\n感谢您的需求提交。Z-MAX团队将在3个工作日内与您联系。\n\n—— 智蜂创元 ZFCY');
  this.reset();
});
</script>
</body>
</html>
