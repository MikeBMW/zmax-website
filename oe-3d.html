<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>储翰光模块产线 · 轨道机器人场景定义 | Z-MAX</title>
<style>
:root{--bg:#06080d;--panel:#0d1117;--border:#1a1f2b;--accent:#00d4aa;--text:#c8d1d9;--muted:#8b949e;--dim:#484f58}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#bar{background:var(--panel);padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:10}
#bar h1{font-size:15px;color:var(--accent)}
#bar .tabs{display:flex;gap:0;margin-left:16px}
#bar .tab{padding:5px 12px;font-size:10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap}
#bar .tab:first-child{border-radius:5px 0 0 5px}
#bar .tab:last-child{border-radius:0 5px 5px 0}
#bar .tab.active{background:#0d3320;color:var(--accent);border-color:#00d4aa44}
#bar a{font-size:10px;color:var(--dim);border:1px solid var(--border);border-radius:4px;padding:3px 8px;text-decoration:none}
#bar .spec-summary{margin-left:auto;display:flex;gap:10px;font-size:10px;color:var(--muted)}
#bar .spec-summary b{color:var(--accent)}

#main{flex:1;display:flex;overflow:hidden}
#canvas-wrap{flex:1;position:relative;cursor:grab;min-width:0}
#canvas-wrap:active{cursor:grabbing}
#canvas-wrap canvas{display:block}

/* Right panel */
#panel{width:340px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
@media(max-width:900px){#panel{position:absolute;right:0;top:56px;bottom:0;z-index:20;width:300px;display:none}
  #panel.open{display:flex}}
#panel-toggle{display:none;position:fixed;right:8px;top:60px;z-index:21;background:var(--panel);border:1px solid var(--accent);color:var(--accent);padding:4px 8px;border-radius:4px;font-size:11px}
@media(max-width:900px){#panel-toggle{display:block}}

#panel h3{font-size:12px;color:var(--accent);padding:12px 14px 6px;border-bottom:1px solid var(--border)}
.card{background:#111827;border:1px solid var(--border);border-radius:8px;padding:12px;margin:8px}
.card.active{border-color:var(--accent);box-shadow:0 0 10px rgba(0,212,170,.1)}
.card .phase-tag{font-size:9px;padding:2px 6px;border-radius:3px;display:inline-block;margin-bottom:4px}
.card .card-title{font-size:13px;font-weight:700;margin-bottom:2px}
.card .card-desc{font-size:10px;color:var(--muted);line-height:1.4;margin-bottom:6px}
.card .specs-row{display:flex;gap:8px;flex-wrap:wrap}
.card .spec-item{flex:1;min-width:60px;background:rgba(0,0,0,.3);border-radius:5px;padding:6px 8px;text-align:center}
.card .spec-item .sv{font-size:13px;font-weight:700;color:#3fb950}
.card .spec-item .sl{font-size:8px;color:var(--dim)}
.card .req-row{display:flex;align-items:center;gap:4px;font-size:9px;margin-top:4px;color:var(--dim);flex-wrap:wrap}
.card .req-dot{width:5px;height:5px;border-radius:3px}
.req-ok{background:#3fb950}.req-warn{background:#f0a500}.req-crit{background:#ff4444}

#progress{position:absolute;bottom:52px;left:0;right:0;height:2px;background:#1a1f2b;z-index:5}
#progress .bar{height:100%;background:var(--accent);transition:width .5s}

#dock{position:absolute;bottom:0;left:0;right:0;background:rgba(13,17,23,.96);border-top:1px solid var(--border);display:flex;gap:0;overflow-x:auto;z-index:5;padding:4px 8px;backdrop-filter:blur(10px)}
#dock .ds{flex:1;min-width:70px;text-align:center;padding:6px 3px;cursor:pointer;border-radius:5px;font-size:9px;transition:all .15s;border:1px solid transparent}
#dock .ds:hover{background:#111827}
#dock .ds.active{background:#0d3320;border-color:#00d4aa44}
#dock .ds .di{font-size:16px;display:block}
#dock .ds .dn{font-weight:600}
#dock .ds .dt{color:var(--dim);font-size:8px}

#specs-table{position:absolute;top:12px;left:12px;z-index:5;background:rgba(13,17,23,.92);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:10px;backdrop-filter:blur(6px)}
#specs-table .row{display:flex;gap:12px;margin:2px 0}
#specs-table .row .k{color:var(--muted);min-width:80px}
#specs-table .row .v{color:var(--accent);font-weight:700}
</style>
</head>

<div id="bar">
  <a href="/">← 主页</a>

    <div class="row"><span class="k">推理引擎</span><span class="v">VLA-T z₁z₂z₃三层潜空间</span></div>
  </div>
  <div id="progress"><div class="bar" style="width:0%"></div></div>
  <div id="dock"></div>
</div>

<div id="panel">
  <h3>📋 工艺卡片</h3>
  <div id="cards"></div>
  <div style="padding:12px;font-size:10px;color:var(--dim);text-align:center;border-top:1px solid var(--border);margin-top:8px">

</div>
</div>
<button id="panel-toggle" onclick="document.getElementById('panel').classList.toggle('open')">📋 工艺卡</button>

<script>

const LINES=[

    {id:"S12",label:"🔥老炼筛选",desc:"85°C 48h带电老炼，自动上下料，剔除早期失效",specs:[["85°C","温度"],["48h","时长"],["2s","上下料"]],reqs:[["长期高温","crit"],["自动上下料","ok"]]}
  ]},
  {name:"模块组装段",color:0x58a6ff,icon:"📦",stations:[
    {id:"S13",label:"🔌PCB焊接",desc:"SMT贴片+回流焊260°C，PCB与OE电气连接I2C",specs:[["260°C","回流焊"],["5s","节拍"],["I2C","通信"]],reqs:[["SMT精度","ok"],["温度曲线","ok"]]},
    {id:"S14",label:"📦外壳装配",desc:"QSFP-DD金属外壳组装，导热垫贴合，螺钉自动锁紧0.3N·m",specs:[["QSFP-DD","封装"],["5s","节拍"],["0.3N·m","扭力"]],reqs:[["扭矩控制","ok"],["导热贴合","ok"]]},
    {id:"S15",label:"📡BERT测试",desc:"误码率PRBS31，灵敏度/过载全温测试BER<1E-12",specs:[["BER<1E-12","误码"],["PRBS31","码型"],["8s","节拍"]],reqs:[["BER达标","crit"],["全温覆盖","ok"]]},
    {id:"S16",label:"👁眼图测试",desc:"眼图模板测试，消光比ER>4dB，抖动自动测量",specs:[["ER>4dB","消光比"],["眼图","模板"],["5s","节拍"]],reqs:[["眼图达标","crit"],["抖动测量","ok"]]},
    {id:"S17",label:"🏷标签打标",desc:"激光打标二维码+序列号，MES系统绑定追溯",specs:[["激光","打标"],["2s","节拍"],["MES","追溯"]],reqs:[["码制正确","ok"],["数据关联","ok"]]},
    {id:"S18",label:"📦FQC包装",desc:"最终质检100%全检，防静电包装，MES出货",specs:[["FQC","100%"],["ESD","防护"],["3s","节拍"]],reqs:[["全检无误","crit"],["ESD合规","ok"]]}
  ]}
]},
{name:"OSA车间 · 电信/PON产线",color:0xa371f7,sections:[
  {name:"电信OSA段",color:0xa371f7,icon:"🔍",stations:[
    {id:"S19",label:"🔍滤波片",desc:"CWDM/DWDM滤波片精密贴装±0.1°，UV固化",specs:[["±0.1°","角度"],["4s","节拍"],["UV","固化"]],reqs:[["角度精度","crit"],["洁净操作","ok"]]},
    {id:"S20",label:"🔗耦合焊",desc:"三光束激光焊接，应力平衡，位移<2μm",specs:[["3光束","激光"],["<2μm","位移"],["6s","节拍"]],reqs:[["应力平衡","crit"],["焊接质量","ok"]]},
    {id:"S21",label:"🌡TC循环",desc:"-40~+85°C温度循环10次，自动上下料",specs:[["-40~85°C","范围"],["10次","循环"],["2s","上下料"]],reqs:[["温循覆盖","ok"],["自动上下料","ok"]]},
    {id:"S22",label:"📐焊软板",desc:"柔性FPC焊接，机器人辅助定位送料",specs:[["FPC","软板"],["5s","节拍"],["烙铁","工艺"]],reqs:[["辅助定位","ok"],["送料精度","ok"]]},
    {id:"S23",label:"📊综合测",desc:"IL/RL/PD响应/追踪误差全参数测试",specs:[["IL<0.5dB","插损"],["PD","监测"],["6s","节拍"]],reqs:[["全参数","ok"],["自动判定","ok"]]},
    {id:"S24",label:"📦包装",desc:"防静电包装+标签+MES出货记录",specs:[["ESD","防护"],["2s","节拍"],["MES","追溯"]],reqs:[["ESD合规","ok"],["数据完整","ok"]]}
  ]}
]},
{name:"仓库 · 原材料+成品+AGV",color:0x3fb950,sections:[
  {name:"仓管段",color:0x3fb950,icon:"📦",stations:[
    {id:"S25",label:"📥IQC来料检",desc:"外观/尺寸/电性能AQL抽检，千分尺量测",specs:[["AQL","抽检"],["千分尺","量具"],["5min/批","节拍"]],reqs:[["抽检覆盖","ok"],["数据记录","ok"]]},
    {id:"S26",label:"📦原料入库",desc:"扫码入库，货架定位，MES库存管理FIFO",specs:[["MES","系统"],["条码","追溯"],["FIFO","策略"]],reqs:[["扫码准确","ok"],["库存同步","ok"]]},
    {id:"S27",label:"🚚AGV配送",desc:"智禾AGV叉车自动配送原料到产线工位±10mm",specs:[["±10mm","定位"],["AGV","自动"],["按需","配送"]],reqs:[["路径规划","ok"],["避障安全","crit"]]},
    {id:"S28",label:"📦成品入库",desc:"FQC后成品扫码入库，23±3°C/<60%RH",specs:[["23±3°C","温控"],["<60%RH","湿度"],["扫码","入库"]],reqs:[["温湿度监控","ok"],["扫码准确","ok"]]},
    {id:"S29",label:"🚛出货发货",desc:"按订单拣货，打包发货，物流追踪MES闭环",specs:[["按单拣货","模式"],["全程","追踪"],["MES","闭环"]],reqs:[["拣货准确","ok"],["信息闭环","ok"]]}
  ]}

];

let currentLine=0,focusedStation=0;
let stationObjects=[],robotObj=null;
let robotTargetX=-18,robotPosX=-18;

// ═══════ THREE.JS ═══════
const wrap=document.getElementById("canvas-wrap");
const W=wrap.clientWidth,H=wrap.clientHeight;
const scene=new THREE.Scene();scene.background=new THREE.Color(0x06080d);scene.fog=new THREE.Fog(0x06080d,15,50);
const camera=new THREE.PerspectiveCamera(42,W/H,1,120);
camera.position.set(4,10,22);camera.lookAt(0,0,-1);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(W,H);
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
wrap.appendChild(renderer.domElement);

// Bright ambient
scene.add(new THREE.AmbientLight(0x334455,.7));
const sun=new THREE.DirectionalLight(0xffeedd,.9);sun.position.set(5,18,10);
sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1;sun.shadow.camera.far=60;
sun.shadow.camera.left=-20;sun.shadow.camera.right=20;
sun.shadow.camera.top=20;sun.shadow.camera.bottom=-3;
scene.add(sun);
// Fill light from front
const fill=new THREE.DirectionalLight(0xaaccff,.4);fill.position.set(0,5,15);scene.add(fill);
// Under-rail glow
const railGlow=new THREE.PointLight(0x00d4aa,.3,8);railGlow.position.set(0,.3,0);scene.add(railGlow);

// Floor
const floorGeom=new THREE.PlaneGeometry(48,20);
const floor=new THREE.Mesh(floorGeom,new THREE.MeshStandardMaterial({color:0x111520,roughness:.85}));
floor.rotation.x=-Math.PI/2;floor.position.y=-.02;floor.receiveShadow=true;scene.add(floor);
const grid=new THREE.GridHelper(48,48,0x2a3040,0x1a1f2b);grid.position.y=.005;scene.add(grid);

// ═══════ RAIL — single straight track ═══════
const railLen=44;
// Base rail
const railBase=new THREE.Mesh(
  new THREE.BoxGeometry(railLen,.15,.35),
  new THREE.MeshStandardMaterial({color:0x3a4050,metalness:.9,roughness:.3})
);
railBase.position.y=.08;railBase.castShadow=true;railBase.receiveShadow=true;scene.add(railBase);
// Glow line
const railLine=new THREE.Mesh(
  new THREE.BoxGeometry(railLen,.015,.06),
  new THREE.MeshBasicMaterial({color:0x00d4aa})
);
railLine.position.y=.16;scene.add(railLine);
// Rail side markers every 2m
for(let x=-20;x<=20;x+=2){
  const m=new THREE.Mesh(new THREE.BoxGeometry(.05,.04,.4),new THREE.MeshBasicMaterial({color:0x00d4aa44}));
  m.position.set(x,.12,0);scene.add(m);
}

// ═══════ Station creation — all on BACK side (Z=-3), facing rail ═══════
function createStation(x,color,size){
  const g=new THREE.Group();
  const w=size||1;
  // Heavy base platform
  const base=new THREE.Mesh(
    new THREE.BoxGeometry(w,.3,.7),
    new THREE.MeshStandardMaterial({color:0x1a1a2e,roughness:.6})
  );
  base.position.y=.15;base.castShadow=true;base.receiveShadow=true;g.add(base);
  // Machine body - brighter
  const body=new THREE.Mesh(
    new THREE.BoxGeometry(w-.1,.65,.5),
    new THREE.MeshStandardMaterial({color,roughness:.25,metalness:.4,emissive:color,emissiveIntensity:.12})
  );
  body.position.y=.6;body.castShadow=true;g.add(body);
  // Work surface (facing rail)
  const surface=new THREE.Mesh(
    new THREE.BoxGeometry(w-.2,.05,.3),
    new THREE.MeshStandardMaterial({color:0x334455,metalness:.6,roughness:.2})
  );
  surface.position.set(0,.3,.45);g.add(surface);
  // Display
  const screen=new THREE.Mesh(
    new THREE.BoxGeometry(.35,.2,.02),
    new THREE.MeshBasicMaterial({color:0x002233})
  );
  screen.position.set(0,.7,.26);g.add(screen);
  // Status light on top
  const lt=new THREE.Mesh(new THREE.SphereGeometry(.05),new THREE.MeshBasicMaterial({color}));
  lt.position.set(.3,.95,.2);g.add(lt);
  // Cable to rail
  const cable=new THREE.Mesh(
    new THREE.CylinderGeometry(.02,.02,3.5,6),
    new THREE.MeshStandardMaterial({color:0x2a3040})
  );
  cable.rotation.x=Math.PI/2;cable.position.set(0,.08,1.75);g.add(cable);
  
  g.position.set(x,0,-3.5);
  return g;
}

// ═══════ BIG BRIGHT ROBOT ═══════
function createRobot(){
  const g=new THREE.Group();
  const bodyColor=0x8899aa,accentColor=0x00d4aa;
  
  // Large chassis base
  const chassis=new THREE.Mesh(
    new THREE.BoxGeometry(.8,.4,.6),
    new THREE.MeshStandardMaterial({color:bodyColor,metalness:.3,roughness:.35})
  );
  chassis.position.y=.35;chassis.castShadow=true;g.add(chassis);
  
  // Body/torso - tall
  const torso=new THREE.Mesh(
    new THREE.BoxGeometry(.5,.8,.4),
    new THREE.MeshStandardMaterial({color:bodyColor,metalness:.35,roughness:.3})
  );
  torso.position.y=1.0;torso.castShadow=true;g.add(torso);
  
  // Accent stripe
  const stripe=new THREE.Mesh(
    new THREE.BoxGeometry(.52,.08,.42),
    new THREE.MeshStandardMaterial({color:accentColor,emissive:accentColor,emissiveIntensity:.4,roughness:.2})
  );
  stripe.position.y=.8;g.add(stripe);
  
  // Head - visible
  const head=new THREE.Mesh(
    new THREE.BoxGeometry(.3,.25,.22),
    new THREE.MeshStandardMaterial({color:bodyColor,metalness:.3,roughness:.3})
  );
  head.position.y=1.55;head.castShadow=true;g.add(head);
  
  // Face screen
  const face=new THREE.Mesh(
    new THREE.BoxGeometry(.2,.15,.02),
    new THREE.MeshBasicMaterial({color:0x001a2a})
  );
  face.position.set(0,1.55,.12);g.add(face);
  
  // Eyes - bright green
  const eyeM=new THREE.MeshBasicMaterial({color:accentColor});
  const eL=new THREE.Mesh(new THREE.SphereGeometry(.04),eyeM);eL.position.set(-.06,1.6,.12);g.add(eL);
  const eR=eL.clone();eR.position.x=.06;g.add(eR);
  
  // Arm - prominent
  const armGroup=new THREE.Group();armGroup.position.set(.3,1.15,0);armGroup.rotation.z=-.4;
  // Upper arm
  const upperArm=new THREE.Mesh(
    new THREE.CylinderGeometry(.06,.05,.6,8),
    new THREE.MeshStandardMaterial({color:bodyColor,metalness:.4,roughness:.3})
  );
  upperArm.position.y=-.1;armGroup.add(upperArm);
  // Forearm
  const forearm=new THREE.Mesh(
    new THREE.CylinderGeometry(.05,.04,.5,8),
    new THREE.MeshStandardMaterial({color:bodyColor,metalness:.4,roughness:.3})
  );
  forearm.position.y=-.6;forearm.rotation.z=.15;armGroup.add(forearm);
  // Gripper - bright green
  const gripBase=new THREE.Mesh(
    new THREE.BoxGeometry(.08,.18,.06),
    new THREE.MeshStandardMaterial({color:accentColor,emissive:accentColor,emissiveIntensity:.5,roughness:.1})
  );
  gripBase.position.y=-.85;armGroup.add(gripBase);
  // Gripper fingers
  for(let s of[-1,1]){
    const finger=new THREE.Mesh(
      new THREE.BoxGeometry(.03,.08,.02),
      new THREE.MeshStandardMaterial({color:accentColor,emissive:accentColor,emissiveIntensity:.3})
    );
    finger.position.set(s*.03,-.95,.02);armGroup.add(finger);
  }
  g.add(armGroup);
  
  // Wheels - large and visible
  for(let sx of[-.28,.28]){
    const wheelGeom=new THREE.CylinderGeometry(.1,.1,.06,16);
    const wheelMat=new THREE.MeshStandardMaterial({color:0x222,roughness:.8});
    const w=new THREE.Mesh(wheelGeom,wheelMat);
    w.rotation.z=Math.PI/2;w.position.set(sx,.1,.22);g.add(w);
    const w2=w.clone();w2.position.z=-.22;g.add(w2);
  }
  
  g.position.set(-18,.08,.5); // On rail, slightly forward
  return g;
}

// ═══════ Build ═══════
function buildLine(idx){
  stationObjects.forEach(s=>scene.remove(s));stationObjects=[];
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",i===idx));
  
  const line=LINES[idx];let allStations=[];
  line.sections.forEach(sec=>{sec.stations.forEach(st=>{allStations.push({...st,color:sec.color,sectionName:sec.name})})});
  
  const total=allStations.length;
  const spacing=total>12?40/total:3.2;
  
  allStations.forEach((st,i)=>{
    const x=-19+i*spacing;
    const s=createStation(x,st.color,total>12?.75:1);
    s.userData={...st,index:i};scene.add(s);stationObjects.push(s);
  });
  
  if(!robotObj){robotObj=createRobot();scene.add(robotObj)}
  focusedStation=0;
  robotTargetX=allStations[0]?(-19):0;
  robotPosX=robotTargetX;
  robotObj.position.x=robotPosX;
  
  buildDock(allStations);
  buildCards(allStations);
  focusStation(0);
}

function buildDock(stations){
  let h="";
  stations.forEach((st,i)=>{
    h+=`<div class="ds" onclick="focusStation(${i})" id="ds${i}">
      <span class="di">${st.label.slice(0,2)}</span>
      <span class="dn">${st.label.slice(3)}</span>
      <span class="dt">${st.specs?.[0]?.[0]||""}</span>
    </div>`;
  });
  document.getElementById("dock").innerHTML=h;
}

function buildCards(stations){
  let h="";
  stations.forEach((st,i)=>{
    const reqsH=st.reqs.map(r=>`<span class="req-dot req-${r[1]}"></span>${r[0]}`).join(" ");
    const specsH=st.specs.map(s=>`<div class="spec-item"><div class="sv">${s[0]}</div><div class="sl">${s[1]}</div></div>`).join("");
    h+=`<div class="card" id="card${i}" onclick="focusStation(${i})">
      <span class="phase-tag" style="background:${'#'+st.color.toString(16).padStart(6,'0')}22;color:${'#'+st.color.toString(16).padStart(6,'0')}">${st.sectionName}</span>
      <div class="card-title">${st.id} ${st.label}</div>
      <div class="card-desc">${st.desc}</div>
      <div class="specs-row">${specsH}</div>
      <div class="req-row">✅ ${reqsH}</div>
    </div>`;
  });
  document.getElementById("cards").innerHTML=h;
}

function focusStation(idx){
  focusedStation=idx;
  const s=stationObjects[idx];
  if(!s)return;
  robotTargetX=s.position.x;
  document.querySelectorAll(".ds").forEach((d,i)=>d.classList.toggle("active",i===idx));
  document.querySelectorAll(".card").forEach((c,i)=>c.classList.toggle("active",i===idx));
  document.getElementById("progress").querySelector(".bar").style.width=((idx+1)/stationObjects.length*100)+"%";
  const card=document.getElementById("card"+idx);
  if(card) card.scrollIntoView({behavior:"smooth",block:"center"});
}

function switchLine(idx){currentLine=idx;buildLine(idx)}

// ═══════ Camera — orbit ═══════
let dragging=false,prev={x:0,y:0},camTheta=0,camPhi=.5,camDist=22,target={x:0,y:1,z:-1.5};
function updateCam(){
  camera.position.x=target.x+camDist*Math.sin(camPhi)*Math.cos(camTheta);
  camera.position.y=target.y+camDist*Math.cos(camPhi);
  camera.position.z=target.z+camDist*Math.sin(camPhi)*Math.sin(camTheta);
  camera.lookAt(target.x,target.y,target.z);
}
wrap.addEventListener("mousedown",e=>{dragging=true;prev={x:e.clientX,y:e.clientY}});
wrap.addEventListener("mousemove",e=>{if(!dragging)return;camTheta-=(e.clientX-prev.x)*.005;camPhi=Math.max(.1,Math.min(1.4,camPhi-(e.clientY-prev.y)*.005));prev={x:e.clientX,y:e.clientY};updateCam()});
wrap.addEventListener("mouseup",()=>dragging=false);
wrap.addEventListener("wheel",e=>{camDist=Math.max(5,Math.min(40,camDist+e.deltaY*.02));updateCam()});
// Touch
wrap.addEventListener("touchstart",e=>{if(e.touches.length===1){dragging=true;prev={x:e.touches[0].clientX,y:e.touches[0].clientY}}});
wrap.addEventListener("touchmove",e=>{if(!dragging||e.touches.length!==1)return;camTheta-=(e.touches[0].clientX-prev.x)*.005;camPhi=Math.max(.1,Math.min(1.4,camPhi-(e.touches[0].clientY-prev.y)*.005));prev={x:e.touches[0].clientX,y:e.touches[0].clientY};updateCam()});
wrap.addEventListener("touchend",()=>dragging=false);

// ═══════ Animation ═══════
let time=0;
function animate(){
  requestAnimationFrame(animate);time+=.016;
  // Smooth lateral movement only
  const dx=robotTargetX-robotPosX;
  if(Math.abs(dx)>.02) robotPosX+=dx*.06;
  robotObj.position.x=robotPosX;
  // Subtle bob
  robotObj.position.y=.08+Math.sin(time*2.5)*.025;
  // Station lights pulse
  stationObjects.forEach(s=>{const lt=s.children[4];if(lt)lt.scale.setScalar(1+Math.sin(time*3+s.position.x)*.2)});
  renderer.render(scene,camera);
}

buildLine(0);updateCam();animate();

// Auto-cycle
setInterval(()=>{if(stationObjects.length>0){focusedStation=(focusedStation+1)%stationObjects.length;focusStation(focusedStation)}},6000);

window.addEventListener("resize",()=>{
  renderer.setSize(wrap.clientWidth,wrap.clientHeight);
  camera.aspect=wrap.clientWidth/wrap.clientHeight;camera.updateProjectionMatrix();
});
</script>
