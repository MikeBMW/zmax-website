<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>光模块全流程产线 · 3D可视化 | Z-MAX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06080d;color:#c8d1d9;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}
#bar{background:#0d1117;padding:8px 16px;border-bottom:1px solid #1a1f2b;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:10}
#bar h1{font-size:15px;color:#00d4aa;white-space:nowrap}
#bar .phases{display:flex;gap:0;margin-left:auto}
#bar .ph-btn{padding:6px 14px;font-size:11px;background:transparent;color:#8b949e;border:1px solid #1a1f2b;cursor:pointer;transition:all .2s}
#bar .ph-btn:first-child{border-radius:6px 0 0 6px}
#bar .ph-btn:last-child{border-radius:0 6px 6px 0}
#bar .ph-btn.active{background:#0d3320;color:#00d4aa;border-color:#00d4aa44}
#bar .ph-btn:hover{color:#e6edf3}
#bar .back{padding:4px 10px;font-size:10px;color:#484f58;border:1px solid #1a1f2b;border-radius:4px;text-decoration:none}
#canvas-wrap{flex:1;position:relative;cursor:grab}
#canvas-wrap:active{cursor:grabbing}
#canvas-wrap canvas{display:block}

/* Overlay panels */
#info-panel{position:absolute;bottom:16px;left:16px;right:16px;display:flex;gap:8px;pointer-events:none;z-index:5}
#info-panel > *{pointer-events:auto}
.step-card{background:rgba(13,17,23,.92);border:1px solid #1a1f2b;border-radius:8px;padding:10px 14px;flex:1;min-width:0;backdrop-filter:blur(8px)}
.step-card .num{font-size:10px;color:#484f58}
.step-card .name{font-size:12px;font-weight:700;margin:2px 0}
.step-card .detail{font-size:10px;color:#8b949e}
.step-card.active{border-color:#00d4aa;box-shadow:0 0 12px rgba(0,212,170,.1)}
.step-card.active .name{color:#00d4aa}

#legend{position:absolute;top:16px;right:16px;background:rgba(13,17,23,.9);border:1px solid #1a1f2b;border-radius:8px;padding:10px 14px;font-size:10px;z-index:5;backdrop-filter:blur(8px)}
#legend .phase-title{font-weight:700;margin-bottom:4px}
#legend .phase-title.p1{color:#f0a500}.p2{color:#58a6ff}.p3{color:#00d4aa}
#legend .row{display:flex;align-items:center;gap:6px;margin:3px 0}
#legend .dot{width:8px;height:8px;border-radius:4px;flex-shrink:0}

#metrics-bar{position:absolute;top:16px;left:16px;display:flex;gap:8px;z-index:5}
.m-box{background:rgba(13,17,23,.9);border:1px solid #00d4aa33;border-radius:6px;padding:8px 12px;text-align:center;backdrop-filter:blur(8px)}
.m-box .val{font-size:16px;font-weight:800;color:#00d4aa}
.m-box .lab{font-size:9px;color:#8b949e}
</style>
</head>
<body>

<div id="bar">
  <a href="/" class="back">← 主页</a>
  <h1>🏭 光模块全流程产线 · 3D</h1>
  <div class="phases">
    <button class="ph-btn active" onclick="switchPhase(0)">🔩 COC基板</button>
    <button class="ph-btn" onclick="switchPhase(1)">🔬 OE光引擎</button>
    <button class="ph-btn" onclick="switchPhase(2)">📦 光模块</button>
  </div>
</div>

<div id="canvas-wrap"></div>

<div id="metrics-bar">
  <div class="m-box"><div class="val" id="m-stations">18</div><div class="lab">工位</div></div>
  <div class="m-box"><div class="val">±1μm</div><div class="lab">贴装精度</div></div>
  <div class="m-box"><div class="val">42s</div><div class="lab">全流程节拍</div></div>
  <div class="m-box"><div class="val">>99.5%</div><div class="lab">良率</div></div>
</div>

<div id="legend">
  <div class="phase-title p1">🔩 阶段一：COC基板</div>
  <div class="row"><span class="dot" style="background:#f0a500"></span>上料+共晶+COC+打线+老化</div>
  <div class="phase-title p2" style="margin-top:6px">🔬 阶段二：OE光引擎</div>
  <div class="row"><span class="dot" style="background:#58a6ff"></span>透镜耦合+光纤阵列+封帽+光测试</div>
  <div class="phase-title p3" style="margin-top:6px">📦 阶段三：光模块组装</div>
  <div class="row"><span class="dot" style="background:#00d4aa"></span>PCB+外壳+BERT+标签包装</div>
</div>

<div id="info-panel">
  <div class="step-card active" id="sc0"><div class="num">工位 1-6</div><div class="name">📦→🔥→🎯→🔗→🕐→✅ COC基板</div><div class="detail">Tray上料→共晶焊→COC贴装→打线→老化→下料</div></div>
  <div class="step-card" id="sc1"><div class="num">工位 7-12</div><div class="name">🔬 OE光引擎装配</div><div class="detail">透镜耦合→光纤阵列→隔离器→封帽→光测试→老炼</div></div>
  <div class="step-card" id="sc2"><div class="num">工位 13-18</div><div class="name">📦 光模块组装</div><div class="detail">PCB焊接→外壳装配→BERT→眼图→标签→包装</div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════
// Three.js 3D Factory Scene
// ═══════════════════════════════════
const wrap=document.getElementById("canvas-wrap");
const W=wrap.clientWidth,H=wrap.clientHeight;

// Scene setup
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x06080d);
scene.fog=new THREE.Fog(0x06080d,20,80);

const camera=new THREE.PerspectiveCamera(50,W/H,1,200);
camera.position.set(12,14,18);
camera.lookAt(0,0,0);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W,H);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
wrap.appendChild(renderer.domElement);

// Lights
const amb=new THREE.AmbientLight(0x1a1f2b,.6);scene.add(amb);
const sun=new THREE.DirectionalLight(0xffffff,.8);
sun.position.set(10,20,5);
sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.near=1;sun.shadow.camera.far=60;
sun.shadow.camera.left=-20;sun.shadow.camera.right=20;
sun.shadow.camera.top=20;sun.shadow.camera.bottom=-20;
scene.add(sun);

// Floor
const floorGeom=new THREE.PlaneGeometry(40,16);
const floorMat=new THREE.MeshStandardMaterial({color:0x0d1117,roughness:.9});
const floor=new THREE.Mesh(floorGeom,floorMat);
floor.rotation.x=-Math.PI/2;floor.position.y=-.01;floor.receiveShadow=true;
scene.add(floor);

// Grid
const gridHelper=new THREE.GridHelper(40,40,0x1a1f2b,0x111);
gridHelper.position.y=.01;scene.add(gridHelper);

// Rail track
const railGeom=new THREE.BoxGeometry(38,.15,.3);
const railMat=new THREE.MeshStandardMaterial({color:0x2a3040,roughness:.4,metalness:.8});
const rail=new THREE.Mesh(railGeom,railMat);
rail.position.set(0,.1,0);rail.receiveShadow=true;rail.castShadow=true;
scene.add(rail);

// Rail highlight line
const railLineGeom=new THREE.BoxGeometry(38,.02,.05);
const railLine=new THREE.Mesh(railLineGeom,new THREE.MeshBasicMaterial({color:0x00d4aa}));
railLine.position.set(0,.18,0);
scene.add(railLine);

// ═══════ Phase data: 18 stations in 3 phases ═══════
const PHASES=[
  {name:"COC基板",color:0xf0a500,stations:[
    {x:-16,z:-3,label:"📦上料",detail:"Tray供料"},
    {x:-10,z:3,label:"🔥共晶",detail:"AuSn 280°C"},
    {x:-5,z:-3,label:"🎯COC",detail:"贴装±1μm"},
    {x:0,z:3,label:"🔗打线",detail:"Au 25μm"},
    {x:5,z:-3,label:"🕐老化",detail:"85°C"},
    {x:10,z:3,label:"✅下料",detail:"AOI检测"}
  ]},
  {name:"OE光引擎",color:0x58a6ff,stations:[
    {x:-6,z:-3,label:"🔍透镜耦合",detail:"UV固化"},
    {x:-2,z:3,label:"🔗光纤阵列",detail:"FA对准"},
    {x:2,z:-3,label:"🛡隔离器",detail:"光隔离"},
    {x:6,z:3,label:"🔒封帽",detail:"气密封装"},
    {x:10,z:-3,label:"📊光测试",detail:"IL/RL"},
    {x:14,z:3,label:"🔥老炼",detail:"85°C 48h"}
  ]},
  {name:"光模块",color:0x00d4aa,stations:[
    {x:-6,z:-3,label:"🔌PCB焊",detail:"SMT"},
    {x:-2,z:3,label:"📦外壳",detail:"组装"},
    {x:2,z:-3,label:"📡BERT",detail:"误码率"},
    {x:6,z:3,label:"👁眼图",detail:"消光比"},
    {x:10,z:-3,label:"🏷标签",detail:"序列号"},
    {x:14,z:3,label:"📦包装",detail:"出货"}
  ]}
];

let currentPhase=0;
let stationMeshes=[];
let robotMesh=null;
let robotTarget={x:0,z:0};
let robotPos={x:-16,z:-3};

// Create station
function createStation(x,z,label,color,detail){
  const group=new THREE.Group();
  // Base
  const baseGeom=new THREE.BoxGeometry(1.2,.3,.8);
  const base=new THREE.Mesh(baseGeom,new THREE.MeshStandardMaterial({color:0x1c2333,roughness:.6}));
  base.position.y=.15;base.castShadow=true;base.receiveShadow=true;
  group.add(base);
  // Top
  const topGeom=new THREE.BoxGeometry(1,.5,.6);
  const top=new THREE.Mesh(topGeom,new THREE.MeshStandardMaterial({color,roughness:.3,emissive:color,emissiveIntensity:.15}));
  top.position.y=.55;top.castShadow=true;
  group.add(top);
  // Glow ring
  const ringGeom=new THREE.TorusGeometry(.3,.03,8,16);
  const ring=new THREE.Mesh(ringGeom,new THREE.MeshBasicMaterial({color}));
  ring.rotation.x=Math.PI/2;ring.position.y=.8;
  group.add(ring);
  group.position.set(x,0,z);
  group.userData={label,detail,color};
  return group;
}

// Robot
function createRobot(){
  const group=new THREE.Group();
  // Body
  const bodyGeom=new THREE.BoxGeometry(.4,.5,.3);
  const body=new THREE.Mesh(bodyGeom,new THREE.MeshStandardMaterial({color:0x1c2333,roughness:.4,metalness:.6}));
  body.position.y=.4;body.castShadow=true;
  group.add(body);
  // Head
  const headGeom=new THREE.BoxGeometry(.25,.2,.2);
  const head=new THREE.Mesh(headGeom,new THREE.MeshStandardMaterial({color:0x2a3040,roughness:.3}));
  head.position.y=.75;head.castShadow=true;
  group.add(head);
  // Eyes
  const eyeGeom=new THREE.SphereGeometry(.03);
  const eyeMat=new THREE.MeshBasicMaterial({color:0x00d4aa});
  const eyeL=new THREE.Mesh(eyeGeom,eyeMat);eyeL.position.set(-.06,.78,.1);group.add(eyeL);
  const eyeR=new THREE.Mesh(eyeGeom,eyeMat);eyeR.position.set(.06,.78,.1);group.add(eyeR);
  // Arm
  const armGeom=new THREE.CylinderGeometry(.03,.03,.6);
  const arm=new THREE.Mesh(armGeom,new THREE.MeshStandardMaterial({color:0x3a4050,metalness:.7}));
  arm.position.set(.2,.5,.1);arm.rotation.z=-.3;arm.castShadow=true;
  group.add(arm);
  // Gripper
  const gripGeom=new THREE.BoxGeometry(.08,.15,.06);
  const grip=new THREE.Mesh(gripGeom,new THREE.MeshStandardMaterial({color:0x00d4aa,emissive:0x00d4aa,emissiveIntensity:.3}));
  grip.position.set(.15,.2,.1);
  group.add(grip);
  // Wheels
  for(let sx of[-.15,.15]){
    const wGeom=new THREE.CylinderGeometry(.08,.08,.06,16);
    const w=new THREE.Mesh(wGeom,new THREE.MeshStandardMaterial({color:0x1a1f2b,roughness:.8}));
    w.rotation.z=Math.PI/2;w.position.set(sx,.1,.15);group.add(w);
    const w2=w.clone();w2.position.z=-.15;group.add(w2);
  }
  return group;
}

// Build scene for phase
function buildPhase(idx){
  // Clear old
  stationMeshes.forEach(s=>scene.remove(s));
  stationMeshes=[];
  
  const phase=PHASES[idx];
  document.querySelectorAll(".ph-btn").forEach((b,i)=>b.classList.toggle("active",i===idx));
  document.querySelectorAll(".step-card").forEach((c,i)=>c.classList.toggle("active",i===idx));
  document.querySelectorAll(".phase-title").forEach((t,i)=>{
    t.classList.toggle("p1",i===0);t.classList.toggle("p2",i===1);t.classList.toggle("p3",i===2);
  });
  
  phase.stations.forEach((st,i)=>{
    const s=createStation(st.x,st.z,st.label,phase.color,st.detail);
    scene.add(s);
    stationMeshes.push(s);
  });
  
  // Move robot to first station of phase
  const first=phase.stations[0];
  robotTarget={x:first.x,z:first.z-.8};
}

// Create initial scene
function initScene(){
  // Phase 0 stations
  buildPhase(0);
  
  // Robot
  robotMesh=createRobot();
  robotMesh.position.set(robotPos.x,.15,robotPos.z);
  scene.add(robotMesh);
  
  // Particles for atmosphere
  const pGeom=new THREE.BufferGeometry();
  const pCount=200;
  const pPositions=new Float32Array(pCount*3);
  for(let i=0;i<pCount*3;i+=3){
    pPositions[i]=(Math.random()-.5)*40;
    pPositions[i+1]=Math.random()*8;
    pPositions[i+2]=(Math.random()-.5)*16;
  }
  pGeom.setAttribute("position",new THREE.BufferAttribute(pPositions,3));
  const pMat=new THREE.PointsMaterial({color:0x00d4aa,size:.03,opacity:.3,transparent:true});
  const particles=new THREE.Points(pGeom,pMat);
  scene.add(particles);
}

function switchPhase(idx){
  currentPhase=idx;
  buildPhase(idx);
}

// ═══════ Camera controls ═══════
let isDragging=false,prevMouse={x:0,y:0};
let camTheta=Math.PI/4,camPhi=Math.PI/5,camDist=22;
let camTarget={x:0,y:0,z:0};

function updateCamera(){
  camera.position.x=camTarget.x+camDist*Math.sin(camPhi)*Math.cos(camTheta);
  camera.position.y=camTarget.y+camDist*Math.cos(camPhi);
  camera.position.z=camTarget.z+camDist*Math.sin(camPhi)*Math.sin(camTheta);
  camera.lookAt(camTarget.x,camTarget.y,camTarget.z);
}

wrap.addEventListener("mousedown",e=>{isDragging=true;prevMouse={x:e.clientX,y:e.clientY}});
wrap.addEventListener("mousemove",e=>{
  if(!isDragging)return;
  const dx=e.clientX-prevMouse.x,dy=e.clientY-prevMouse.y;
  camTheta-=dx*.005;camPhi=Math.max(.1,Math.min(Math.PI/2-.1,camPhi-dy*.005));
  prevMouse={x:e.clientX,y:e.clientY};
  updateCamera();
});
wrap.addEventListener("mouseup",()=>isDragging=false);
wrap.addEventListener("wheel",e=>{
  camDist=Math.max(8,Math.min(40,camDist+e.deltaY*.02));
  updateCamera();
});

// Touch
wrap.addEventListener("touchstart",e=>{
  if(e.touches.length===1){isDragging=true;prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY}}
});
wrap.addEventListener("touchmove",e=>{
  if(!isDragging||e.touches.length!==1)return;
  const dx=e.touches[0].clientX-prevMouse.x,dy=e.touches[0].clientY-prevMouse.y;
  camTheta-=dx*.005;camPhi=Math.max(.1,Math.min(Math.PI/2-.1,camPhi-dy*.005));
  prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};
  updateCamera();
});
wrap.addEventListener("touchend",()=>isDragging=false);

// ═══════ Animation ═══════
let time=0;
function animate(){
  requestAnimationFrame(animate);
  time+=.016;
  
  // Move robot toward target
  const dx=robotTarget.x-robotPos.x;
  const dz=robotTarget.z-robotPos.z;
  const dist=Math.sqrt(dx*dx+dz*dz);
  if(dist>.05){
    robotPos.x+=dx*.03;
    robotPos.z+=dz*.03;
  }
  robotMesh.position.set(robotPos.x,.15,robotPos.z);
  // Bob
  robotMesh.position.y+=Math.sin(time*3)*.02;
  
  // Station glow pulse
  stationMeshes.forEach(s=>{
    const ring=s.children[2];
    if(ring)ring.scale.setScalar(1+Math.sin(time*4+s.position.x)*.1);
  });
  
  renderer.render(scene,camera);
}

// Resize
window.addEventListener("resize",()=>{
  const w=wrap.clientWidth,h=wrap.clientHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h;camera.updateProjectionMatrix();
});

// Init
initScene();
updateCamera();
animate();

// Auto-rotate demo: cycle through phases every 15s
setInterval(()=>{
  switchPhase((currentPhase+1)%3);
},15000);
</script>
</body>
</html>
