<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Orin Realsense · Z-MAX</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh}img{max-width:100%;max-height:100vh;border:2px solid #00d4aa;border-radius:4px}</style></head><body>
<img id="cam" alt="Realsense" style="max-width:100%;max-height:100vh">
<script>
var el=document.getElementById('cam');
function load(){
  fetch('/orin_realtime.jpg?r='+Math.random(),{cache:'no-store'})
    .then(function(r){return r.blob()})
    .then(function(b){el.src=URL.createObjectURL(b)});
}
load();
setInterval(load,200);
</script>
</body></html>
