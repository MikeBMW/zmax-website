<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Z-MAX 群聊 · v3.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#c8d1d9;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#bar{background:#111;padding:8px 12px;border-bottom:1px solid #222;display:flex;align-items:center;gap:8px;flex-shrink:0}
#bar h1{font-size:14px;color:#00d4aa;flex:1}
#bar .members{font-size:10px;color:#8b949e}
#user-switch{position:relative;cursor:pointer}
#user-switch .cur{display:flex;align-items:center;gap:6px;padding:4px 10px;background:#1c2333;border-radius:6px;border:1px solid #30363d;font-size:12px}
#user-switch .cur .av{width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:10px}
#user-drop{display:none;position:absolute;top:100%;right:0;background:#1c2333;border:1px solid #30363d;border-radius:6px;z-index:100;min-width:120px;margin-top:4px}
#user-drop .u{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px}
#user-drop .u:hover{background:#30363d}
#user-drop .u .av{width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:10px}
#msgs{flex:1;overflow-y:auto;padding:10px 12px;-webkit-overflow-scrolling:touch}
.msg{margin-bottom:10px;display:flex;gap:6px}
.msg .avatar{min-width:28px;height:28px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.msg.me{flex-direction:row-reverse}
.msg.me .bubble{text-align:right}
.msg .bubble{max-width:75%}
.msg .name{font-size:10px;font-weight:700;margin-bottom:1px}
.msg .text{background:#161b22;border-radius:8px;padding:6px 10px;font-size:12px;line-height:1.5;word-break:break-word}
.msg.me .text{background:#0d3320}
.msg.mention-me .text{border:1px solid #f0c060;box-shadow:0 0 8px rgba(240,192,96,.15)}
.msg.mention-all .text{border:1px solid #ff4444;box-shadow:0 0 12px rgba(255,68,68,.2)}
.msg .time{font-size:9px;color:#484f58;margin-top:2px}
.mention{color:#f0c060;font-weight:700;background:rgba(240,192,96,.1);padding:1px 3px;border-radius:3px}
.mention-all{color:#ff4444;font-weight:700;background:rgba(255,68,68,.1);padding:1px 3px;border-radius:3px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
#foot{background:#111;padding:8px 10px;border-top:1px solid #222;flex-shrink:0;position:relative}
#mention-hint{display:none;position:absolute;bottom:100%;left:10px;right:10px;background:#1c2333;border:1px solid #30363d;border-radius:6px;max-height:180px;overflow-y:auto;z-index:50;margin-bottom:2px}
#mention-hint .mh{padding:8px 12px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px}
#mention-hint .mh:hover{background:#30363d}
#mention-hint .mh.all{color:#ff4444;font-weight:700}
#foot .input-row{display:flex;gap:6px}
#foot textarea{flex:1;background:#1c2333;color:#c8d1d9;border:1px solid #30363d;border-radius:8px;padding:8px;resize:none;height:40px;font:12px -apple-system;outline:none}
#foot textarea:focus{border-color:#00d4aa}
#foot button{background:#00d4aa;color:#000;border:none;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
#foot button:active{opacity:.8}
.info{font-size:10px;color:#484f58;padding:2px 10px 4px}
.av-dani{background:#4a3000}.av-xspace{background:#0d3320}.av-web{background:#1a1033}.av-xiaofang{background:#332010}
.toast{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#00d4aa;color:#000;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:700;z-index:200;animation:slideDown .3s}
@keyframes slideDown{from{transform:translate(-50%,-100%);opacity:0}to{transform:translate(-50%,0);opacity:1}}
</style>
</head>
<body>

<div id="bar">
  <h1>💬 Z-MAX</h1>
  <span class="members">👑大倪 · 🟢静静 · 🟣web · 🟠小芳</span>
  <div id="user-switch" onclick="toggleUserMenu(event)">
    <div class="cur">
      <span class="av" id="cur-av" style="background:#4a3000">👑</span>
      <span id="cur-name">大倪</span>
      <span style="font-size:8px">▼</span>
    </div>
    <div id="user-drop"></div>
  </div>
</div>
<div id="msgs"></div>
<div id="foot">
  <div id="mention-hint"></div>
  <div id="toast-area"></div>
  <div class="info" id="info-bar">👑 当前身份: <b id="info-who">大倪（静界）</b> — 输入 @ 可 @人</div>
  <div class="input-row">
    <textarea id="inp" placeholder="输入消息... 输入 @ 可以 @人 或 @all" onkeydown="handleKey(event)" oninput="checkMention()"></textarea>
    <button onclick="send()">发送</button>
  </div>
</div>

<script>
// ═══════════════════════════════════
// Config
// ═══════════════════════════════════
const API="/forum.php";
const USERS={
  dani:{name:"大倪",avatar:"👑",color:"#f0c060",bg:"#4a3000",label:"大倪（静界）"},
  xspace:{name:"静静",avatar:"🟢",color:"#3fb950",bg:"#0d3320",label:"静静（xspace）"},
  web:{name:"web",avatar:"🟣",color:"#a371f7",bg:"#1a1033",label:"web（PM）"},
  xiaofang:{name:"小芳",avatar:"🟠",color:"#f0883e",bg:"#332010",label:"小芳（硬件）"}
};
const MENTION_KEYS={dani:"@大倪",xspace:"@静静",web:"@web",xiaofang:"@小芳","all":"@all"};

let currentUser="dani";
let lastMsgCount=0;
let lastMsgTexts=[];
let notifiedMsgs=new Set();

// ═══════════════════════════════════
// User switcher
// ═══════════════════════════════════
function buildUserMenu(){
  let h="";
  for(let k in USERS){
    let u=USERS[k];
    h+=`<div class="u" onclick="event.stopPropagation();switchUser('${k}')">
      <span class="av" style="background:${u.bg}">${u.avatar}</span>
      <span style="color:${u.color}">${u.name}</span>
      ${k===currentUser?'<span style="font-size:10px;color:#00d4aa;margin-left:auto">✓</span>':''}
    </div>`;
  }
  document.getElementById("user-drop").innerHTML=h;
}
function toggleUserMenu(e){
  e.stopPropagation();
  let d=document.getElementById("user-drop");
  d.style.display=d.style.display==="block"?"none":"block";
  buildUserMenu();
}
function switchUser(id){
  currentUser=id;
  let u=USERS[id];
  document.getElementById("cur-av").style.background=u.bg;
  document.getElementById("cur-av").textContent=u.avatar;
  document.getElementById("cur-name").textContent=u.name;
  document.getElementById("info-who").textContent=u.label;
  document.getElementById("user-drop").style.display="none";
  document.getElementById("inp").focus();
}
document.addEventListener("click",()=>{
  document.getElementById("user-drop").style.display="none";
});
buildUserMenu();

// ═══════════════════════════════════
// @mention autocomplete
// ═══════════════════════════════════
function checkMention(){
  let inp=document.getElementById("inp");
  let v=inp.value;
  let pos=inp.selectionStart;
  // Find @ before cursor
  let atIdx=v.lastIndexOf("@",pos-1);
  let hint=document.getElementById("mention-hint");
  if(atIdx<0||atIdx>pos){hint.style.display="none";return}
  
  let query=v.substring(atIdx+1,pos).toLowerCase();
  // Don't trigger mid-word
  if(atIdx>0&&v[atIdx-1]!==' '&&v[atIdx-1]!=='\n'){hint.style.display="none";return}
  
  let matches=[];
  if("all".startsWith(query)) matches.push({id:"all",name:"@all 所有人",avatar:"📢",color:"#ff4444",cls:"all"});
  for(let k in USERS){
    if(k===currentUser) continue;
    let u=USERS[k];
    if(k.startsWith(query)||u.name.includes(query)||MENTION_KEYS[k].toLowerCase().includes(query)){
      matches.push({id:k,name:MENTION_KEYS[k],avatar:u.avatar,color:u.color,cls:""});
    }
  }
  
  if(matches.length===0){hint.style.display="none";return}
  
  let h="";
  matches.forEach(m=>{
    h+=`<div class="mh ${m.cls}" onclick="insertMention('${m.id}',${atIdx},${pos})">
      <span style="font-size:14px">${m.avatar}</span>
      <span style="color:${m.color}">${m.name}</span>
    </div>`;
  });
  hint.innerHTML=h;
  hint.style.display="block";
}
function insertMention(id,atIdx,endPos){
  let inp=document.getElementById("inp");
  let v=inp.value;
  let mentionText=id==="all"?"@all ":"@"+USERS[id].name+" ";
  inp.value=v.substring(0,atIdx)+mentionText+v.substring(endPos);
  document.getElementById("mention-hint").style.display="none";
  inp.focus();
  inp.selectionStart=inp.selectionEnd=atIdx+mentionText.length;
}
function handleKey(e){
  let hint=document.getElementById("mention-hint");
  if(e.key==="Enter"&&!e.shiftKey){
    if(hint.style.display==="block"){
      e.preventDefault();
      hint.querySelector(".mh").click();
      return;
    }
    e.preventDefault();
    send();
  }
  if(e.key==="Escape"){hint.style.display="none"}
}

// ═══════════════════════════════════
// Notifications
// ═══════════════════════════════════
function requestNotify(){
  if("Notification" in window && Notification.permission==="default"){
    Notification.requestPermission();
  }
}
function notify(title,body,tag){
  if("Notification" in window && Notification.permission==="granted"){
    new Notification(title,{body,icon:"/favicon.ico",tag});
  }
  // Sound
  try{
    let ctx=new (window.AudioContext||window.webkitAudioContext)();
    let o=ctx.createOscillator();let g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=800;g.gain.value=0.1;
    o.start();o.stop(ctx.currentTime+0.1);
  }catch(e){}
}

// ═══════════════════════════════════
// Message parsing
// ═══════════════════════════════════
function parseMsg(text){
  // Escape HTML
  let t=text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // Highlight @all
  t=t.replace(/@all\b/gi,'<span class="mention-all">@all</span>');
  // Highlight @mentions
  for(let k in USERS){
    let re=new RegExp("@"+USERS[k].name+"\\b","g");
    t=t.replace(re,'<span class="mention">@'+USERS[k].name+'</span>');
  }
  // Links
  t=t.replace(/(https?:\/\/\S+)/g,'<a href="$1" target="_blank" style="color:#58a6ff">$1</a>');
  return t;
}
function hasMention(text,userId){
  if(userId==="all") return /\b@all\b/i.test(text);
  return new RegExp("@"+USERS[userId].name+"\\b","i").test(text);
}

// ═══════════════════════════════════
// Load & render
// ═══════════════════════════════════
async function load(){
  try{
    let r=await fetch(API);
    let msgs=await r.json();
    msgs.reverse();
    let h="";
    msgs.forEach(m=>{
      let from=m.from||"dani";
      let u=USERS[from]||USERS.dani;
      let isMe=from===currentUser;
      let mentionsMe=hasMention(m.msg,currentUser);
      let mentionsAll=/\b@all\b/i.test(m.msg);
      let cls=["msg"];
      if(isMe) cls.push("me");
      if(mentionsMe) cls.push("mention-me");
      if(mentionsAll) cls.push("mention-all");
      
      h+=`<div class="${cls.join(' ')}">
        <div class="avatar" style="background:${u.bg}">${u.avatar}</div>
        <div class="bubble">
          <div class="name" style="color:${u.color}">${u.name}${from==='dani'?' 👑':''}</div>
          <div class="text">${parseMsg(m.msg)}</div>
          <div class="time">${m.time||''}</div>
        </div>
      </div>`;
    });
    document.getElementById("msgs").innerHTML=h||"<p style='color:#484f58;text-align:center;margin-top:40px'>暂无消息，发送第一条吧 🚀</p>";
    
    // Scroll & notify
    if(msgs.length>lastMsgCount){
      document.getElementById("msgs").scrollTop=9999999;
      // Check for new @mentions
      let newMsgs=msgs.slice(lastMsgCount);
      newMsgs.forEach(m=>{
        let key=m.from+"|"+m.time+"|"+m.msg.substring(0,20);
        if(notifiedMsgs.has(key)) return;
        notifiedMsgs.add(key);
        if(hasMention(m.msg,currentUser)){
          notify("💬 "+USERS[m.from].name+" @了你",m.msg.substring(0,80),"mention");
        }else if(/\b@all\b/i.test(m.msg)){
          notify("📢 @all 全员通知",USERS[m.from].name+": "+m.msg.substring(0,80),"all");
        }
      });
      lastMsgCount=msgs.length;
    }
  }catch(e){console.error(e)}
}

// ═══════════════════════════════════
// Send
// ═══════════════════════════════════
async function send(){
  let inp=document.getElementById("inp");
  let t=inp.value.trim();
  if(!t) return;
  inp.disabled=true;
  try{
    await fetch(API,{method:"POST",body:JSON.stringify({from:currentUser,msg:t})});
    inp.value="";
    inp.disabled=false;
    inp.focus();
    document.getElementById("mention-hint").style.display="none";
    await load();
  }catch(e){
    inp.disabled=false;
    toast("发送失败，请重试");
  }
}

// ═══════════════════════════════════
// Toast
// ═══════════════════════════════════
function toast(msg){
  let d=document.createElement("div");
  d.className="toast";d.textContent=msg;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),2000);
}

// ═══════════════════════════════════
// Init
// ═══════════════════════════════════
requestNotify();
load();
setInterval(load,2000);
document.getElementById("inp").focus();
</script>
</body>
</html>
