#panel h3{font-size:11px;color:#00d4aa;padding:10px 12px 4px;border-bottom:1px solid #1a1f2b}

#info-popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(13,17,23,.95);border:1px solid #00d4aa44;border-radius:10px;padding:14px 18px;z-index:10;display:none;max-width:300px;pointer-events:none}
#info-popup .name{font-size:13px;font-weight:700;color:#00d4aa}
#info-popup .desc{font-size:10px;color:#8b949e;margin:4px 0}
#info-popup .specs{display:flex;gap:10px}
#info-popup .spec{text-align:center}
#info-popup .spec .v{font-size:12px;font-weight:700;color:#3fb950}
#info-popup .spec .l{font-size:8px;color:#484f58}

.zone-card{cursor:pointer}
.zone-card .zone-process{display:none;margin-top:8px;padding-top:8px;border-top:1px solid #1a1f2b}
.zone-card.expanded .zone-process{display:block}
.process-flow{display:flex;flex-wrap:wrap;align-items:center;gap:2px}
.process-step{background:#0d1117;border:1px solid #1a1f2b;border-radius:5px;padding:4px 6px;min-width:60px;text-align:center}
.process-step .st-id{font-size:8px;color:#484f58}
.process-step .st-label{font-size:10px;font-weight:600;color:#c8d1d9}
.process-step .st-specs{font-size:7px;color:#8b949e;margin-top:1px}
.process-arrow{color:#00d4aa44;font-size:10px;flex-shrink:0}
.process-flow .process-arrow:last-child{display:none}
#cursor-coord{position:fixed;pointer-events:none;z-index:20;background:rgba(0,212,170,.15);border:1px solid #00d4aa44;border-radius:4px;padding:2px 6px;font:9px monospace;color:#00d4aa;display:none}
</style>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════
// MULTI-ZONE FACTORY LAYOUT
// ═══════════════════════════════════════
const ZONES=[
  {id:"coc",name:"COC基板区",color:0xf0a500,pos:{x:-11,z:-8},size:{w:14,d:8},stations:[
    {id:"S01",label:"上料",desc:"Tray供料·视觉定位±5μm",specs:[["±5μm","定位"],["3s","节拍"]]},
    {id:"S02",label:"共晶焊",desc:"AuSn 280°C·力控3N",specs:[["280°C","温控"],["8s","节拍"]]},
    {id:"S03",label:"COC贴装",desc:"±1μm·6轴力控",specs:[["±1μm","精度"],["5s","节拍"]]},
    {id:"S04",label:"金线键合",desc:"Au 25μm US焊",specs:[["25μm","金线"],["4s","节拍"]]},
    {id:"S05",label:"老化上料",desc:"85°C·96槽",specs:[["85°C","温度"],["2s","节拍"]]},
    {id:"S06",label:"AOI下料",desc:"光学检测·MES",specs:[["AOI","检测"],["3s","节拍"]]}
  ]},
  {id:"oe",name:"OE光引擎区",color:0xff6b35,pos:{x:8,z:-8},size:{w:14,d:8},stations:[
    {id:"S07",label:"透镜耦合",desc:"±0.5μm·UV固化",specs:[["±0.5μm","对准"],["8s","节拍"]]},
    {id:"S08",label:"光纤阵列",desc:"多通道·激光焊",specs:[["多通道","并行"],["6s","节拍"]]},
    {id:"S09",label:"隔离器",desc:">30dB·<1dB插损",specs:[[">30dB","隔离"],["4s","节拍"]]},
    {id:"S10",label:"封帽气密",desc:"He检漏·100%",specs:[["<1E-8","漏率"],["6s","节拍"]]},
    {id:"S11",label:"光参数",desc:"IL/RL/光谱",specs:[["IL<3dB","插损"],["5s","节拍"]]},
    {id:"S12",label:"老炼筛选",desc:"85°C 48h",specs:[["85°C","温度"],["2s","节拍"]]}
  ]},
  {id:"mod",name:"模块组装区",color:0x58a6ff,pos:{x:8,z:6},size:{w:14,d:8},stations:[
    {id:"S13",label:"PCB焊接",desc:"SMT·260°C",specs:[["260°C","回流焊"],["5s","节拍"]]},
    {id:"S14",label:"外壳装配",desc:"QSFP-DD·0.3N·m",specs:[["QSFP-DD","封装"],["5s","节拍"]]},
    {id:"S15",label:"BERT",desc:"PRBS31·BER<1E-12",specs:[["BER<1E-12","误码"],["8s","节拍"]]},
    {id:"S16",label:"眼图",desc:"ER>4dB·模板",specs:[["ER>4dB","消光比"],["5s","节拍"]]},
    {id:"S17",label:"标签",desc:"激光打标·MES",specs:[["激光","打标"],["2s","节拍"]]},
    {id:"S18",label:"FQC包装",desc:"100%全检·ESD",specs:[["FQC","全检"],["3s","节拍"]]}
  ]},
  {id:"wh",name:"仓库物流区",color:0x3fb950,pos:{x:-11,z:6},size:{w:14,d:8},stations:[
    {id:"S25",label:"IQC来料检",desc:"AQL抽检",specs:[["AQL","标准"],["千分尺","量具"]]},
    {id:"S26",label:"原料入库",desc:"扫码·FIFO",specs:[["MES","系统"],["条码","追溯"]]},
    {id:"S27",label:"AGV配送",desc:"自动配送±10mm",specs:[["±10mm","定位"],["AGV","自动"]]},
    {id:"S28",label:"成品入库",desc:"23°C·<60%RH",specs:[["温控","恒温"],["扫码","入库"]]},
    {id:"S29",label:"出货",desc:"拣货·MES闭环",specs:[["按单","拣货"],["全程","追踪"]]}
  ]}
];

let stationObjects=[],agvObj=null,robotObjs=[];
let agvTarget={x:-6,z:0},agvPos={x:-6,z:0};
let hoveredStation=null;

// 4 robots — one per zone, never cross zones
const ROBOT_DEFS=[
  {name:"Z1",zone:"coc",x:-11,z:-4,patrol:[{x:-11,z:-4},{x:-4,z:-4},{x:-4,z:-10},{x:-11,z:-10}]},
  {name:"Z2",zone:"oe", x:8,  z:-4,patrol:[{x:8,z:-4},{x:14,z:-4},{x:14,z:-10},{x:8,z:-10}]},
  {name:"Z3",zone:"mod",x:8,  z:2, patrol:[{x:8,z:2},{x:14,z:2},{x:14,z:8},{x:8,z:8}]},
  {name:"Z4",zone:"wh", x:-17,z:5, patrol:[{x:-17,z:5},{x:-4,z:5},{x:-4,z:8},{x:-17,z:8}]}
];

// ═══════ THREE.JS ═══════
const wrap=document.getElementById("view3d"),W=wrap.clientWidth,H=wrap.clientHeight;
const scene=new THREE.Scene();scene.background=new THREE.Color(0x06080d);
scene.fog=new THREE.Fog(0x06080d,15,50);
const camera=new THREE.PerspectiveCamera(50,W/H,.5,120);
camera.position.set(0,22,18);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(W,H);
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
wrap.appendChild(renderer.domElement);

// Bright lighting
scene.add(new THREE.AmbientLight(0x445566,.8));
const sun=new THREE.DirectionalLight(0xffffff,1.0);sun.position.set(5,20,8);
sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1;sun.shadow.camera.far=80;
sun.shadow.camera.left=-18;sun.shadow.camera.right=18;
sun.shadow.camera.top=18;sun.shadow.camera.bottom=-18;
scene.add(sun);
scene.add(new THREE.DirectionalLight(0xaaccee,.35)).position.set(-5,8,12);

// Floor
const floorGeom=new THREE.PlaneGeometry(36,24);
const floor=new THREE.Mesh(floorGeom,new THREE.MeshStandardMaterial({color:0x111520,roughness:.85}));
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);
const grid=new THREE.GridHelper(36,36,0x2a3040,0x1a1f2b);grid.position.y=.003;scene.add(grid);

// Coordinate labels — origin at bottom-left: display X=3dx+18, Y=-3dz+12
function addLabel(text,x,y,z,color,size){
  const w=size||1.2,h=(size||1.2)*.42;
  const cv=document.createElement("canvas");cv.width=128;cv.height=48;
  const cx=cv.getContext("2d");cx.font="bold 16px monospace";cx.textAlign="center";cx.textBaseline="middle";
  cx.fillStyle=color;cx.fillText(text,64,24);
  const tx=new THREE.CanvasTexture(cv);tx.minFilter=THREE.LinearFilter;
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),new THREE.MeshBasicMaterial({map:tx,transparent:true,depthTest:false,depthWrite:false,side:THREE.DoubleSide}));
  m.rotation.x=-Math.PI/2;m.position.set(x,.025,z);m.renderOrder=998;scene.add(m);
}
// X axis — bottom edge (Z=+12): display X = 3D_X + 18
for(let x3d=-16;x3d<=16;x3d+=6) addLabel("X:"+(x3d+18),x3d,.025,11.8,"#00d4aa88");
// Y axis — left edge (X=-18): display Y = -3D_Z + 12
for(let z3d=10;z3d>=-10;z3d-=6) addLabel("Y:"+(-z3d+12),-17.8,.025,z3d,"#f0a50088");
// Origin marker — bright sphere + large label at bottom-left corner (3D -18,12 = display 0,0)
const originDot=new THREE.Mesh(new THREE.SphereGeometry(.3,16,16),new THREE.MeshBasicMaterial({color:0xffffff}));
originDot.position.set(-18,.07,12);scene.add(originDot);
const originRing=new THREE.Mesh(new THREE.TorusGeometry(.35,.04,8,24),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.5}));
originRing.rotation.x=-Math.PI/2;originRing.position.set(-18,.04,12);scene.add(originRing);
addLabel("⬤ 原点 (0,0)",-18,.04,11.3,"#ffffff",1.5);
addLabel("3D(-18,12)",-18,.04,10.8,"#ffffff66");
// Top-right corner
addLabel("(36,24)",18.5,.03,-12,"#ffffff44");

// ═══════ Factory walls ═══════
function createWall(x,z,w,d,color){
  const g=new THREE.Group();
  // Floor tile
  const tile=new THREE.Mesh(new THREE.PlaneGeometry(w-.3,d-.3),new THREE.MeshStandardMaterial({color,roughness:.7,metalness:.1}));
  tile.rotation.x=-Math.PI/2;tile.position.y=.01;g.add(tile);
  // Border
  const borderGeom=new THREE.BoxGeometry(w,.08,.05);
  const bm=new THREE.MeshStandardMaterial({color:0x3a4050,metalness:.5});
  for(let [bx,bz,br] of [[0,-d/2,0],[0,d/2,0],[-w/2,0,Math.PI/2],[w/2,0,Math.PI/2]]){
    const b=new THREE.Mesh(borderGeom,bm);b.position.set(bx,.04,bz);if(br)b.rotation.y=br;g.add(b);
  }
  g.position.set(x,0,z);
  g.userData={isZone:true};
  return g;
}

// ═══════ Station machine — close to rail ═══════
function createStation(x,z,color,label,specs){
  const g=new THREE.Group();
  // Heavy base
  const base=new THREE.Mesh(new THREE.BoxGeometry(.8,.25,.7),new THREE.MeshStandardMaterial({color:0x1a1a2e,roughness:.6}));
  base.position.y=.13;base.castShadow=base.receiveShadow=true;g.add(base);
  // Body
  const body=new THREE.Mesh(new THREE.BoxGeometry(.7,.55,.5),new THREE.MeshStandardMaterial({color,roughness:.25,metalness:.4,emissive:color,emissiveIntensity:.1}));
  body.position.y=.5;body.castShadow=true;g.add(body);
  // Work surface
  const ws=new THREE.Mesh(new THREE.BoxGeometry(.6,.04,.35),new THREE.MeshStandardMaterial({color:0x445566,metalness:.6,roughness:.2}));
  ws.position.set(0,.28,.42);g.add(ws);
  // Screen
  g.add(new THREE.Mesh(new THREE.BoxGeometry(.3,.15,.02),new THREE.MeshBasicMaterial({color:0x002233}))).position.set(0,.58,.26);
  // Status light
  g.add(new THREE.Mesh(new THREE.SphereGeometry(.04),new THREE.MeshBasicMaterial({color}))).position.set(.28,.78,.2);
  // Connector to rail
  const conn=new THREE.Mesh(new THREE.CylinderGeometry(.015,.015,1.5,6),new THREE.MeshStandardMaterial({color:0x3a4050}));
  conn.rotation.x=Math.PI/2;conn.position.set(0,.06,.9);g.add(conn);
  
  g.position.set(x,0,z);
  g.userData={label,color,specs,isStation:true};
  // tiny coord label
  const cl=createCoordSprite(x,z,color);g.add(cl.sprite);
  return g;
}

// ═══════ Rail segment ═══════
function createRail(x,z,len,rotY){
  const g=new THREE.Group();
  g.add(new THREE.Mesh(new THREE.BoxGeometry(len,.1,.2),new THREE.MeshStandardMaterial({color:0x3a4050,metalness:.9,roughness:.3})));
  g.children[0].position.y=.05;
  g.add(new THREE.Mesh(new THREE.BoxGeometry(len,.01,.04),new THREE.MeshBasicMaterial({color:0x00d4aa})));
  g.children[1].position.y=.11;
  g.position.set(x,0,z);if(rotY)g.rotation.y=rotY;
  return g;
}

// ═══════ Robot — close to machines ═══════
function createRobot(x,z){
  const g=new THREE.Group();const bc=0x99aabb,ac=0x00d4aa;
  // Base
  g.add(new THREE.Mesh(new THREE.BoxGeometry(.7,.3,.5),new THREE.MeshStandardMaterial({color:bc,metalness:.3,roughness:.3})));
  g.children[0].position.y=.2;g.children[0].castShadow=true;
  // Body
  g.add(new THREE.Mesh(new THREE.BoxGeometry(.4,.6,.3),new THREE.MeshStandardMaterial({color:bc,metalness:.35,roughness:.25})));
  g.children[1].position.y=.7;g.children[1].castShadow=true;
  // Stripe
  g.add(new THREE.Mesh(new THREE.BoxGeometry(.42,.06,.32),new THREE.MeshStandardMaterial({color:ac,emissive:ac,emissiveIntensity:.4})));
  g.children[2].position.y=.58;
  // Head
  g.add(new THREE.Mesh(new THREE.BoxGeometry(.25,.2,.18),new THREE.MeshStandardMaterial({color:bc,metalness:.25})));
  g.children[3].position.y=1.12;g.children[3].castShadow=true;
  // Eyes
  const em=new THREE.MeshBasicMaterial({color:ac});
  g.add(new THREE.Mesh(new THREE.SphereGeometry(.03),em)).position.set(-.04,1.16,.09);
  g.add(new THREE.Mesh(new THREE.SphereGeometry(.03),em)).position.set(.04,1.16,.09);
  // Arm
  const armG=new THREE.Group();armG.position.set(.24,.8,0);armG.rotation.z=-.35;
  armG.add(new THREE.Mesh(new THREE.CylinderGeometry(.045,.035,.5,8),new THREE.MeshStandardMaterial({color:bc,metalness:.4})));
  armG.children[0].position.y=-.05;
  armG.add(new THREE.Mesh(new THREE.CylinderGeometry(.035,.03,.38,8),new THREE.MeshStandardMaterial({color:bc,metalness:.4})));
  armG.children[1].position.y=-.48;armG.children[1].rotation.z=.15;
  const gm=new THREE.MeshStandardMaterial({color:ac,emissive:ac,emissiveIntensity:.5,roughness:.1});
  armG.add(new THREE.Mesh(new THREE.BoxGeometry(.06,.12,.04),gm)).position.y=-.7;
  for(let s of[-1,1]) armG.add(new THREE.Mesh(new THREE.BoxGeometry(.02,.06,.012),gm)).position.set(s*.02,-.78,.012);
  g.add(armG);
  // Wheels
  for(let sx of[-.22,.22]){
    const w=new THREE.Mesh(new THREE.CylinderGeometry(.08,.08,.04,16),new THREE.MeshStandardMaterial({color:0x222,roughness:.8}));
    w.rotation.z=Math.PI/2;w.position.set(sx,.07,.18);g.add(w);
    w.clone().position.z=-.18;g.add(w.clone());
  }
  g.position.set(x,.05,z);
  g.userData={isRobot:true};
  return g;
}

// ═══════ AGV cart ═══════
function createAGV(x,z){
  const g=new THREE.Group();
  const bc=0x667788;
  g.add(new THREE.Mesh(new THREE.BoxGeometry(.5,.15,.35),new THREE.MeshStandardMaterial({color:bc,metalness:.4,roughness:.3})));
  g.children[0].position.y=.12;g.children[0].castShadow=true;
  // Cargo
  g.add(new THREE.Mesh(new THREE.BoxGeometry(.4,.2,.3),new THREE.MeshStandardMaterial({color:0x334455,metalness:.3})));
  g.children[1].position.y=.3;
  // Light
  g.add(new THREE.Mesh(new THREE.SphereGeometry(.03),new THREE.MeshBasicMaterial({color:0xffaa00})));
  g.children[2].position.set(.2,.25,.12);
  // Wheels
  for(let [sx,sz] of[[-.18,.14],[-.18,-.14],[.18,.14],[.18,-.14]]){
    const w=new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,.03,10),new THREE.MeshStandardMaterial({color:0x222}));
    w.rotation.z=Math.PI/2;w.position.set(sx,.05,sz);g.add(w);
  }
  g.position.set(x,.03,z);
  g.userData={isAGV:true};
  return g;
}

// ═══════ Green trajectory line between zone centers ═══════
function createTrajectory(x1,z1,x2,z2){
  const dx=x2-x1,dz=z2-z1,len=Math.sqrt(dx*dx+dz*dz);
  const g=new THREE.Group();
  // Glow layer (wider, transparent)
  const glow=new THREE.Mesh(
    new THREE.BoxGeometry(len,.02,.15),
    new THREE.MeshBasicMaterial({color:0x00d4aa,transparent:true,opacity:.3})
  );
  glow.position.y=.012;g.add(glow);
  // Core line
  const core=new THREE.Mesh(
    new THREE.BoxGeometry(len,.02,.06),
    new THREE.MeshBasicMaterial({color:0x00d4aa})
  );
  core.position.y=.014;g.add(core);
  // Arrowhead at end
  const arrow=new THREE.Mesh(
    new THREE.ConeGeometry(.15,.35,4),
    new THREE.MeshBasicMaterial({color:0x00d4aa})
  );
  arrow.rotation.x=-Math.PI/2;arrow.position.set(len/2-.2,.04,0);
  g.add(arrow);
  g.position.set((x1+x2)/2,.01,(z1+z2)/2);
  g.rotation.y=Math.atan2(dz,dx);
  return g;
}

// ═══════ Floor zone labels ═══════
function createFloorLabel(text,x,z){
  const canvas=document.createElement('canvas');canvas.width=512;canvas.height=128;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#ffffff';ctx.font='bold 44px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,256,64);
  const tex=new THREE.CanvasTexture(canvas);
  const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,depthTest:false,depthWrite:false});
  const plane=new THREE.Mesh(new THREE.PlaneGeometry(10,2.5),mat);
  plane.rotation.x=-Math.PI/2;plane.position.set(x,.02,z);
  plane.renderOrder=999;
  return plane;
}

// ═══════ Coordinate sprite (small label on ground) ═══════
function createCoordSprite(x3d,z3d,color){
  const dx=x3d+18,dy=-z3d+12;
  const cv=document.createElement('canvas');cv.width=128;cv.height=32;
  const cx=cv.getContext('2d');
  cx.fillStyle=color||'#8b949e';cx.font='bold 12px monospace';
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('('+dx.toFixed(1)+','+dy.toFixed(1)+')',64,16);
  const tx=new THREE.CanvasTexture(cv);tx.minFilter=THREE.LinearFilter;
  const m=new THREE.Mesh(new THREE.PlaneGeometry(2,.5),new THREE.MeshBasicMaterial({map:tx,transparent:true,depthTest:false,depthWrite:false}));
  m.rotation.x=-Math.PI/2;m.position.set(x3d,.015,z3d);m.renderOrder=997;
  return {sprite:m,canvas:cv,ctx:cx,texture:tx};
}

function updateCoordSprite(cs,x3d,z3d){
  const dx=x3d+18,dy=-z3d+12;
  cs.ctx.clearRect(0,0,128,32);
  cs.ctx.fillStyle=cs.ctx.fillStyle||'#00d4aa';
  cs.ctx.font='bold 12px monospace';
  cs.ctx.textAlign='center';cs.ctx.textBaseline='middle';
  cs.ctx.fillText('('+dx.toFixed(1)+','+dy.toFixed(1)+')',64,16);
  cs.texture.needsUpdate=true;
  cs.sprite.position.set(x3d,.015,z3d);
}

// ═══════ Build factory ═══════
function buildFactory(){
  // Clear
  while(scene.children.length>7){
    const c=scene.children[7];
    if(c.userData&&(c.userData.isStation||c.userData.isZone||c.userData.isRobot||c.userData.isAGV)) scene.remove(c);
    else break;
  }
  stationObjects=[];

  // Zone floors
  ZONES.forEach(z=>{
    const wall=createWall(z.pos.x,z.pos.z,z.size.w,z.size.d,z.color);
    scene.add(wall);
    scene.add(createFloorLabel(z.name,z.pos.x,z.pos.z));
  });

  // Rails — loop around zones + branches to stations
  // Main horizontal: COC→OE (top), Module→Warehouse (bottom)  
  scene.add(createRail(-4,-12,14,0));  // COC front
  scene.add(createRail(7,-12,14,0));   // OE front
  scene.add(createRail(7,4,14,0));     // Module front
  scene.add(createRail(-4,4,14,0));    // Warehouse front
  // Vertical connectors
  scene.add(createRail(-11,-2,12,Math.PI/2)); // COC→WH
  scene.add(createRail(14,-2,12,Math.PI/2));  // OE→Module
  // AGV path (wider, on ground)
  for(let [rx,rz,rw,rh] of [[0,-12,28,.08],[0,4,28,.08],[-11,-2,.08,12],[14,-2,.08,12]]){
    const path=new THREE.Mesh(new THREE.BoxGeometry(rw,.015,rh),new THREE.MeshStandardMaterial({color:0x1a2a1a,roughness:.9}));
    path.position.set(rx,.008,rz);scene.add(path);
  }

  // Green trajectory: COC→OE→MOD→WH (zone centers)
  scene.add(createTrajectory(-11,-8,8,-8));   // COC→OE
  scene.add(createTrajectory(8,6,-11,6));     // MOD→WH
  // Turning point coordinate markers
  [{x:-11,z:-8},{x:8,z:-8},{x:8,z:6},{x:-11,z:6}].forEach(p=>{
    scene.add(createCoordSprite(p.x,p.z,'#00d4aa').sprite);
  });

  // Stations — placed CLOSE to rails, facing inward
  ZONES.forEach(z=>{
    z.stations.forEach((st,i)=>{
      // Position stations along the rail, alternating sides for variety
      const sx=z.pos.x-z.size.w/2+1.5+i*2;
      const sz=z.pos.z+(i%2===0?-1:1)*2.5;
      const s=createStation(sx,sz,z.color,st.label,st.specs);
      s.userData={...s.userData,...st,zoneId:z.id,zoneName:z.name};
      scene.add(s);stationObjects.push(s);
    });
  });

  // Robots — 4 robots, one per zone, patrol within zone only
  if(robotObjs.length===0){
    ROBOT_DEFS.forEach(rd=>{
      const r={obj:createRobot(rd.x,rd.z),pos:{x:rd.x,z:rd.z},target:{x:rd.x,z:rd.z},
               patrol:rd.patrol,patrolIdx:0,zone:rd.zone,name:rd.name,coordSprite:null,nameSprite:null};
      r.coordSprite=createCoordSprite(rd.x,rd.z,'#00d4aa');
      scene.add(r.obj);scene.add(r.coordSprite.sprite);
      // name label above robot
      const nameCv=document.createElement('canvas');nameCv.width=64;nameCv.height=32;
      const nameCx=nameCv.getContext('2d');
      nameCx.fillStyle='#00d4aa';nameCx.font='bold 18px monospace';
      nameCx.textAlign='center';nameCx.textBaseline='middle';
      nameCx.fillText(rd.name,32,16);
      const nameTx=new THREE.CanvasTexture(nameCv);nameTx.minFilter=THREE.LinearFilter;
      const namePlane=new THREE.Mesh(new THREE.PlaneGeometry(.8,.4),new THREE.MeshBasicMaterial({map:nameTx,transparent:true,depthTest:false,depthWrite:false}));
      namePlane.position.set(rd.x,1.6,rd.z);namePlane.renderOrder=1000;
      r.nameSprite={sprite:namePlane,canvas:nameCv,ctx:nameCx,texture:nameTx};
      scene.add(namePlane);
      robotObjs.push(r);
    });
  }

  // AGV
  if(!agvObj){agvObj=createAGV(0,-6);scene.add(agvObj)}
  agvPos={x:0,z:-6};agvTarget={x:0,z:-6};

  buildZonesList();
}

function buildZonesList(){
  let h="";
  ZONES.forEach(z=>{
    const clr='#'+z.color.toString(16).padStart(6,'0');
    const steps=z.stations.map(s=>
      '<span class="process-step">'+
        '<div class="st-id">'+s.id+'</div>'+
        '<div class="st-label">'+s.label+'</div>'+
        '<div class="st-specs">'+(s.specs||[]).map(sp=>sp[0]).join(' · ')+'</div>'+
      '</span>'
    ).join('<span class="process-arrow">→</span>');
    h+=`<div class="zone-card" id="zone-${z.id}" onclick="event.stopPropagation();toggleZone('${z.id}')">
      <div class="zone-title" style="color:${clr}" onclick="event.stopPropagation();flyTo('${z.id}')">${z.name}</div>
      <div class="zone-sub" style="display:flex;justify-content:space-between">
        <span>${z.stations.length}个工位</span>
        <span style="font-size:7px;color:#484f58">点击展开工艺▼</span>
      </div>
      <div class="zone-process">
        <div class="process-flow">${steps}</div>
      </div>
    </div>`;
  });
  document.getElementById("zones-list").innerHTML=h;
}

function toggleZone(zoneId){
  const card=document.getElementById('zone-'+zoneId);
  card.classList.toggle('expanded');
  // close others
  document.querySelectorAll('.zone-card').forEach(c=>{if(c!==card)c.classList.remove('expanded')});
}

// ═══════ Camera fly-to ═══════
function flyTo(zoneId){
  const z=ZONES.find(x=>x.id===zoneId);
  if(!z)return;
  const start={x:lookTarget.x,y:lookTarget.y,z:lookTarget.z};
  const end={x:z.pos.x,y:0,z:z.pos.z};
  const st=Date.now();
  function anim(){
    const t=Math.min((Date.now()-st)/800,1);
    const e=t<.5?2*t*t:-1+(4-2*t)*t;
    lookTarget.x=start.x+(end.x-start.x)*e;
    lookTarget.y=start.y+(end.y-start.y)*e;
    lookTarget.z=start.z+(end.z-start.z)*e;
    updateCam();
    if(t<1)requestAnimationFrame(anim);
  }
  anim();
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".zone-card").forEach(c=>c.classList.remove("active"));
  const btn=document.querySelector(`.nav button[onclick*="${zoneId}"]`);
  if(btn)btn.classList.add("active");
  document.getElementById("zone-"+zoneId)?.classList.add("active");
}

// ═══════ Mouse interaction ═══════
const raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2();
wrap.addEventListener("mousemove",e=>{
  mouse.x=(e.clientX/wrap.clientWidth)*2-1;
  mouse.y=-(e.clientY/wrap.clientHeight)*2+1;
  const cc=document.getElementById("cursor-coord");
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObject(floor);
  if(hits.length){const p=hits[0].point;cc.textContent='('+(p.x+18).toFixed(1)+','+(-p.z+12).toFixed(1)+')';cc.style.display='block';cc.style.left=(e.clientX+14)+'px';cc.style.top=(e.clientY-24)+'px'}
  else{cc.style.display='none'}
});
wrap.addEventListener("click",e=>{
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(stationObjects,true);
  if(hits.length>0){
    let obj=hits[0].object;
    while(obj&&!obj.userData.isStation)obj=obj.parent;
    if(obj&&obj.userData.isStation){
      const d=obj.userData;
      const popup=document.getElementById("info-popup");
      popup.innerHTML=`<div class="name">${d.id} ${d.label}</div>
        <div class="desc">${d.desc||""} · ${d.zoneName||""}</div>
        <div class="specs">${(d.specs||[]).map(s=>`<div class="spec"><div class="v">${s[0]}</div><div class="l">${s[1]}</div></div>`).join("")}</div>`;
      popup.style.display="block";
      setTimeout(()=>popup.style.display="none",3000);
    }
  }
});

// ═══════ Camera: left=orbit, middle=pan, wheel=zoom ═══════
let dragging=false,panning=false,prevMX=0,prevMY=0;
let camTheta=0,camPhi=.7,camDist=22;
let lookTarget={x:0,y:0,z:0};

function updateCam(){
  camera.position.set(
    lookTarget.x+camDist*Math.sin(camPhi)*Math.cos(camTheta),
    lookTarget.y+camDist*Math.cos(camPhi),
    lookTarget.z+camDist*Math.sin(camPhi)*Math.sin(camTheta)
  );
  camera.lookAt(lookTarget.x,lookTarget.y,lookTarget.z);
}
wrap.addEventListener("mousedown",e=>{
  if(e.button===0){dragging=true;prevMX=e.clientX;prevMY=e.clientY}
  if(e.button===1){panning=true;prevMX=e.clientX;prevMY=e.clientY;e.preventDefault()}
});
wrap.addEventListener("mousemove",e=>{
  if(dragging){
    camTheta+=(e.clientX-prevMX)*.005;
    camPhi=Math.max(.15,Math.min(1.5,camPhi-(e.clientY-prevMY)*.005));
    prevMX=e.clientX;prevMY=e.clientY;
    updateCam();
  }
  if(panning){
    const right=new THREE.Vector3();camera.getWorldDirection(right);
    const up=new THREE.Vector3(0,1,0);
    const left=new THREE.Vector3().crossVectors(up,right).normalize();
    const worldUp=new THREE.Vector3().crossVectors(right,left).normalize();
    const dx=(e.clientX-prevMX)*.02,dy=(e.clientY-prevMY)*.02;
    lookTarget.x+=left.x*dx+worldUp.x*dy;
    lookTarget.y+=left.y*dx+worldUp.y*dy;
    lookTarget.z+=left.z*dx+worldUp.z*dy;
    prevMX=e.clientX;prevMY=e.clientY;
    updateCam();
  }
});
wrap.addEventListener("mouseup",()=>{dragging=false;panning=false});
wrap.addEventListener("wheel",e=>{
  e.preventDefault();
  camDist=Math.max(5,Math.min(40,camDist+e.deltaY*.03));
  updateCam();
},{passive:false});
wrap.addEventListener("auxclick",e=>e.preventDefault());
// Touch
wrap.addEventListener("touchstart",e=>{
  if(e.touches.length===1){dragging=true;prevMX=e.touches[0].clientX;prevMY=e.touches[0].clientY}
});
wrap.addEventListener("touchmove",e=>{
  if(!dragging||e.touches.length!==1)return;
  camTheta+=(e.touches[0].clientX-prevMX)*.005;
  camPhi=Math.max(.15,Math.min(1.5,camPhi-(e.touches[0].clientY-prevMY)*.005));
  prevMX=e.touches[0].clientX;prevMY=e.touches[0].clientY;
  updateCam();
});
wrap.addEventListener("touchend",()=>dragging=false);

// ═══════ Animation ═══════
let time=0;
function animate(){
  requestAnimationFrame(animate);time+=.016;
  
  // Robot movement — 4 robots, each patrols within its own zone
  robotObjs.forEach(r=>{
    const wp=r.patrol[r.patrolIdx];
    const rdx=wp.x-r.pos.x,rdz=wp.z-r.pos.z;
    if(Math.abs(rdx)<.08&&Math.abs(rdz)<.08) r.patrolIdx=(r.patrolIdx+1)%r.patrol.length;
    r.pos.x+=rdx*.03;r.pos.z+=rdz*.03;
    r.obj.position.set(r.pos.x,.05,r.pos.z);
    r.obj.position.y+=Math.sin(time*2.5+r.pos.x)*.02;
    r.obj.rotation.y=Math.atan2(rdx,rdz);
    // update coord sprite + name sprite with real-time position
    if(r.coordSprite){updateCoordSprite(r.coordSprite,r.pos.x,r.pos.z)};
    if(r.nameSprite){r.nameSprite.sprite.position.set(r.pos.x,1.6,r.pos.z)};
  });
  
  // AGV movement (patrol)
  const agvPath=[
    {x:-7,z:-6},{x:-4,z:-6},{x:0,z:-6},{x:4,z:-6},{x:10,z:-6},
    {x:10,z:-2},{x:10,z:2},{x:10,z:6},
    {x:4,z:6},{x:0,z:6},{x:-4,z:6},{x:-7,z:6},
    {x:-7,z:2},{x:-7,z:-2}
  ];
  const agvIdx=Math.floor(time*0.3)%agvPath.length;
  agvTarget=agvPath[agvIdx];
  const adx=agvTarget.x-agvPos.x,adz=agvTarget.z-agvPos.z;
  agvPos.x+=adx*.03;agvPos.z+=adz*.03;
  agvObj.position.set(agvPos.x,.03,agvPos.z);
  if(Math.abs(adx)>.05) agvObj.rotation.y=adx>0?Math.PI/2:-Math.PI/2;
  else if(Math.abs(adz)>.05) agvObj.rotation.y=adz>0?0:Math.PI;
  
  // Station lights
  stationObjects.forEach(s=>{
    const lt=s.children[4];
    if(lt)lt.scale.setScalar(1+Math.sin(time*3+s.position.x)*.2);
  });
  
  renderer.render(scene,camera);
}

buildFactory();
updateCam();
animate();
window.addEventListener("resize",()=>{
  renderer.setSize(wrap.clientWidth,wrap.clientHeight);
  camera.aspect=wrap.clientWidth/wrap.clientHeight;camera.updateProjectionMatrix();
});
</script>
