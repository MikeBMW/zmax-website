// Coordinate labels — origin at bottom-left: display X=3dx+18, Y=-3dz+12
function addLabel(text,x,y,z,color,size){
  const w=size||1.2,h=(size||1.2)*.42;
  const cv=document.createElement("canvas");cv.width=128;cv.height=48;
  const cx=cv.getContext("2d");cx.font="bold 16px monospace";cx.textAlign="center";cx.textBaseline="middle";
  cx.fillStyle=color;cx.fillText(text,64,24);
  const tx=new THREE.CanvasTexture(cv);tx.minFilter=THREE.LinearFilter;
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),new THREE.MeshBasicMaterial({map:tx,transparent:true,depthTest:false,depthWrite:false,side:THREE.DoubleSide}));
  m.rotation.x=-Math.PI/2;m.position.set(x,.025,z);m.renderOrder=998;scene.add(m);
}

// Y axis — left edge (X=-18): display Y = -3D_Z + 12

// ═══════ Factory walls ═══════
function createWall(x,z,w,d,color){
  const g=new THREE.Group();
  // Floor tile
  const tile=new THREE.Mesh(new THREE.PlaneGeometry(w-.3,d-.3),new THREE.MeshStandardMaterial({color,roughness:.7,metalness:.1}));
  tile.rotation.x=-Math.PI/2;tile.position.y=.01;g.add(tile);
  // Border
  const borderGeom=new THREE.BoxGeometry(w,.08,.05);
  const bm=new THREE.MeshStandardMaterial({color:0x3a4050,metalness:.5});
  for(let [bx,bz,br] of [[0,-d/2,0],[0,d/2,0],[-w/2,0,Math.PI/2],[w/2,0,Math.PI/2]]){
    const b=new THREE.Mesh(borderGeom,bm);b.position.set(bx,.04,bz);if(br)b.rotation.y=br;g.add(b);
  }
  g.position.set(x,0,z);
  g.userData={isZone:true};
  return g;
}

  cx.fillStyle='#ffffff';cx.font='bold 20px "PingFang SC","Microsoft YaHei",sans-serif';
  cx.textAlign='center';cx.textBaseline='middle';

  const tx=new THREE.CanvasTexture(cv);tx.minFilter=THREE.LinearFilter;
  const plane=new THREE.Mesh(new THREE.PlaneGeometry(3,.6),

  plane.rotation.x=-Math.PI/2;
  plane.position.set(x,y,z);plane.renderOrder=1001;
  return plane;
}

function createStation(x,z,color,label,specs){

  const base=new THREE.Mesh(new THREE.BoxGeometry(.8,.25,.7),new THREE.MeshStandardMaterial({color:0x1a1a2e,roughness:.6}));

  // Body
  const body=new THREE.Mesh(new THREE.BoxGeometry(.7,.55,.5),new THREE.MeshStandardMaterial({color,roughness:.25,metalness:.4,emissive:color,emissiveIntensity:.1}));
  body.position.y=.5;body.castShadow=true;g.add(body);
  // Work surface
  const ws=new THREE.Mesh(new THREE.BoxGeometry(.6,.04,.35),new THREE.MeshStandardMaterial({color:0x445566,metalness:.6,roughness:.2}));
  ws.position.set(0,.28,.42);g.add(ws);
  // Screen
  g.add(new THREE.Mesh(new THREE.BoxGeometry(.3,.15,.02),new THREE.MeshBasicMaterial({color:0x002233}))).position.set(0,.58,.26);
  // Status light
  g.add(new THREE.Mesh(new THREE.SphereGeometry(.04),new THREE.MeshBasicMaterial({color}))).position.set(.28,.78,.2);
  // Connector to rail
  const conn=new THREE.Mesh(new THREE.CylinderGeometry(.015,.015,1.5,6),new THREE.MeshStandardMaterial({color:0x3a4050}));
  conn.rotation.x=Math.PI/2;conn.position.set(0,.06,.9);g.add(conn);
  
  g.position.set(x,0,z);
  g.userData={label,color,specs,isStation:true};
  return g;
}

// ═══════ AGV cart ═══════
function createAGV(x,z,bodyColor,stripeColor){
  const g=new THREE.Group();
  const bc=bodyColor||0x00ffcc;
  const sc=stripeColor||0xffffff;
  // Body — emissive glow on dark background
  g.add(new THREE.Mesh(new THREE.BoxGeometry(.5,.15,.35),
    new THREE.MeshStandardMaterial({color:bc,metalness:.2,roughness:.4,emissive:bc,emissiveIntensity:.5})));
  g.children[0].position.y=.12;g.children[0].castShadow=true;
  // Cargo — bright stripe
  g.add(new THREE.Mesh(new THREE.BoxGeometry(.4,.2,.3),
    new THREE.MeshStandardMaterial({color:sc,metalness:.2,roughness:.4,emissive:sc,emissiveIntensity:.4})));
  g.children[1].position.y=.3;
  // Beacon — pulsing bright
  g.add(new THREE.Mesh(new THREE.SphereGeometry(.04),
    new THREE.MeshBasicMaterial({color:bc})));
  g.children[2].position.set(.2,.30,.12);
  // Wheels
  for(let [sx,sz] of[[-.18,.14],[-.18,-.14],[.18,.14],[.18,-.14]]){

}

// ═══════ Floor zone labels ═══════
function createFloorLabel(text,x,z){
  const canvas=document.createElement('canvas');canvas.width=512;canvas.height=128;

  ctx.fillStyle='#ffffff';ctx.font='bold 44px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,256,64);

// ═══════ Coordinate sprite (small label on ground) ═══════
function createCoordSprite(x3d,z3d,color,sizeMul){
  const dx=(x3d+18)*10,dy=(-z3d+12)*10;
  const cv=document.createElement('canvas');cv.width=256;cv.height=64;
  const cx=cv.getContext('2d');
  cx.fillStyle=color||'#8b949e';cx.font='bold 18px monospace';
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('('+dx.toFixed(0)+','+dy.toFixed(0)+')',128,32);
  const tx=new THREE.CanvasTexture(cv);tx.minFilter=THREE.LinearFilter;
  const m=new THREE.Mesh(new THREE.PlaneGeometry(3.2,.8),new THREE.MeshBasicMaterial({map:tx,transparent:true,depthTest:false,depthWrite:false}));
  m.rotation.x=-Math.PI/2;m.position.set(x3d,.018,z3d);m.renderOrder=997;
  return {sprite:m,canvas:cv,ctx:cx,texture:tx};
}

function updateCoordSprite(cs,x3d,z3d){
  const dx=(x3d+18)*10,dy=(-z3d+12)*10;
  cs.ctx.clearRect(0,0,256,64);
  cs.ctx.fillStyle=cs.ctx.fillStyle||'#00d4aa';
  cs.ctx.font='bold 18px monospace';
  cs.ctx.textAlign='center';cs.ctx.textBaseline='middle';
  cs.ctx.fillText('('+dx.toFixed(0)+','+dy.toFixed(0)+')',128,32);
  cs.texture.needsUpdate=true;
  cs.sprite.position.set(x3d,.018,z3d);
}

  lbc2Plane.rotation.x=-Math.PI/2;lbc2Plane.position.set(15.5,.025,-7);lbc2Plane.renderOrder=1001;

  for(let si=0;si<3;si++){

  // Stations — grid layout per zone
  ZONES.forEach(z=>{

  // AGVs — 4台高对比色往返4区（当前1台展开）
  const AGV_DEFS=[

    {x:10,z:-6,c:0xffff00,s:0x222222,n:'A2',zone:'oe'},   // 亮黄
    {x:10,z:2, c:0xff44ff,s:0xffffff,n:'A3',zone:'mod'},  // 亮粉
    {x:-3,z:2, c:0xff8800,s:0x222222,n:'A4',zone:'wh'}    // 亮橙
  ];
  if(agvObjs.length===0){
    AGV_DEFS.forEach((d,i)=>{
      const a={obj:createAGV(d.x,d.z,d.c,d.s),pos:{x:d.x,z:d.z},target:{x:d.x,z:d.z},

      scene.add(a.obj);
      // name label above AGV
      const nCv=document.createElement('canvas');nCv.width=64;nCv.height=32;
      const nCx=nCv.getContext('2d');
      nCx.fillStyle='#'+d.c.toString(16).padStart(6,'0');nCx.font='bold 18px monospace';
      nCx.textAlign='center';nCx.textBaseline='middle';
      nCx.fillText(d.n,32,16);
      const nTx=new THREE.CanvasTexture(nCv);nTx.minFilter=THREE.LinearFilter;
      const nPlane=new THREE.Mesh(new THREE.PlaneGeometry(.8,.4),
        new THREE.MeshBasicMaterial({map:nTx,transparent:true,depthTest:false,depthWrite:false}));
      nPlane.position.set(d.x,.6,d.z);nPlane.renderOrder=1000;
      a.nameSprite={sprite:nPlane,canvas:nCv,ctx:nCx,texture:nTx};
      scene.add(nPlane);
      agvObjs.push(a);
    });
  }
  agvPos={x:0,z:-6};agvTarget={x:0,z:-6};

  buildZonesList();
}

function buildZonesList(){
  let h="";
  ZONES.forEach(z=>{
    const clr='#'+z.color.toString(16).padStart(6,'0');
    const steps=z.stations.map(s=>
      '<span class="process-step">'+
        '<div class="st-id">'+s.id+'</div>'+
        '<div class="st-label">'+s.label+'</div>'+
      '</span>'
    ).join('<span class="process-arrow">→</span>');
    h+=`<div class="zone-card" id="zone-${z.id}" onclick="event.stopPropagation();toggleZone('${z.id}')">
      <div class="zone-title" style="color:${clr}" onclick="event.stopPropagation();flyTo('${z.id}')">${z.name}</div>
      <div class="zone-sub" style="display:flex;justify-content:space-between">
        <span>${z.stations.length}个工位</span>
        <span style="font-size:7px;color:#484f58">点击展开工艺▼</span>
      </div>
      <div class="zone-process">
        <div class="process-flow">${steps}</div>
      </div>
    </div>`;
  });
  document.getElementById("zones-list").innerHTML=h;
}

function toggleZone(zoneId){
  const card=document.getElementById('zone-'+zoneId);
  card.classList.toggle('expanded');
  // close others
  document.querySelectorAll('.zone-card').forEach(c=>{if(c!==card)c.classList.remove('expanded')});
}

// ═══════ Camera fly-to ═══════
function flyTo(zoneId){
  const z=ZONES.find(x=>x.id===zoneId);
  if(!z)return;
  const start={x:lookTarget.x,y:lookTarget.y,z:lookTarget.z};
  const end={x:z.pos.x,y:0,z:z.pos.z};
  const st=Date.now();
  function anim(){
    const t=Math.min((Date.now()-st)/800,1);
    const e=t<.5?2*t*t:-1+(4-2*t)*t;
    lookTarget.x=start.x+(end.x-start.x)*e;
    lookTarget.y=start.y+(end.y-start.y)*e;
    lookTarget.z=start.z+(end.z-start.z)*e;
    updateCam();
    if(t<1)requestAnimationFrame(anim);
  }
  anim();
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".zone-card").forEach(c=>c.classList.remove("active"));
  const btn=document.querySelector(`.nav button[onclick*="${zoneId}"]`);
  if(btn)btn.classList.add("active");
  document.getElementById("zone-"+zoneId)?.classList.add("active");
}

const raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2();
wrap.addEventListener("mousemove",e=>{
  mouse.x=(e.clientX/wrap.clientWidth)*2-1;
  mouse.y=-(e.clientY/wrap.clientHeight)*2+1;
  const cc=document.getElementById("cursor-coord");
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObject(floor);
  if(hits.length){const p=hits[0].point;cc.textContent='('+((p.x+18)*10).toFixed(0)+','+((-p.z+12)*10).toFixed(0)+')';cc.style.display='block';cc.style.left=(e.clientX+14)+'px';cc.style.top=(e.clientY-24)+'px'}
  else{cc.style.display='none'}
});
wrap.addEventListener("click",e=>{

  const hits=raycaster.intersectObjects(stationObjects,true);

      popup.style.display="block";
      setTimeout(()=>popup.style.display="none",3000);
    }

});

// ═══════ Camera: left=orbit, middle=pan, wheel=zoom ═══════
let dragging=false,panning=false,prevMX=0,prevMY=0;
let camTheta=1.57,camPhi=.15,camDist=28;
let lookTarget={x:0,y:0,z:0};

function updateCam(){
  camera.position.set(
    lookTarget.x+camDist*Math.sin(camPhi)*Math.cos(camTheta),
    lookTarget.y+camDist*Math.cos(camPhi),
    lookTarget.z+camDist*Math.sin(camPhi)*Math.sin(camTheta)
  );
  camera.lookAt(lookTarget.x,lookTarget.y,lookTarget.z);
}
wrap.addEventListener("mousedown",e=>{
  var el=e.target;
  while(el){if(el.id==='panel'||el.classList.contains('zone-card'))return;el=el.parentElement}
  if(e.button===0){dragging=true;prevMX=e.clientX;prevMY=e.clientY}
  if(e.button===1){panning=true;prevMX=e.clientX;prevMY=e.clientY;e.preventDefault()}
});
wrap.addEventListener("mousemove",e=>{
  if(dragging){
    camTheta+=(e.clientX-prevMX)*.005;
    camPhi=Math.max(.15,Math.min(1.5,camPhi-(e.clientY-prevMY)*.005));
    prevMX=e.clientX;prevMY=e.clientY;
    updateCam();
  }
  if(panning){
    const right=new THREE.Vector3();camera.getWorldDirection(right);
    const up=new THREE.Vector3(0,1,0);
    const left=new THREE.Vector3().crossVectors(up,right).normalize();
    const worldUp=new THREE.Vector3().crossVectors(right,left).normalize();
    const dx=(e.clientX-prevMX)*.02,dy=(e.clientY-prevMY)*.02;
    lookTarget.x+=left.x*dx+worldUp.x*dy;
    lookTarget.y+=left.y*dx+worldUp.y*dy;
    lookTarget.z+=left.z*dx+worldUp.z*dy;
    prevMX=e.clientX;prevMY=e.clientY;
    updateCam();
  }
});
wrap.addEventListener("mouseup",()=>{dragging=false;panning=false});
wrap.addEventListener("wheel",e=>{
  e.preventDefault();
  camDist=Math.max(5,Math.min(40,camDist+e.deltaY*.03));
  updateCam();
},{passive:false});
wrap.addEventListener("auxclick",e=>e.preventDefault());
// Touch
wrap.addEventListener("touchstart",e=>{
  if(e.touches.length===1){dragging=true;prevMX=e.touches[0].clientX;prevMY=e.touches[0].clientY}
});
wrap.addEventListener("touchmove",e=>{
  if(!dragging||e.touches.length!==1)return;
  camTheta+=(e.touches[0].clientX-prevMX)*.005;
  camPhi=Math.max(.15,Math.min(1.5,camPhi-(e.touches[0].clientY-prevMY)*.005));
  prevMX=e.touches[0].clientX;prevMY=e.touches[0].clientY;
  updateCam();
});
wrap.addEventListener("touchend",()=>dragging=false);

// ═══════ Animation ═══════
let time=0;
function animate(){
  requestAnimationFrame(animate);time+=.016;
  
  // Robot movement — visit each station in row, left to right, loop
  robotObjs.forEach(r=>{
    const rowStations=stationObjects.filter(s=>
      s.userData.zoneId===r.zone&&Math.abs(s.position.z-r.rowZ)<1.5
    ).sort((a,b)=>a.position.x-b.position.x);
    if(rowStations.length===0)return;
    const st=rowStations[r.stepIdx%rowStations.length];
    const tx=st.position.x,tz=r.rowZ+1.2;
    const rdx=tx-r.pos.x,rdz=tz-r.pos.z;
    if(Math.abs(rdx)<.08&&Math.abs(rdz)<.08){
      if(r.dwell<150){r.dwell++;r.workAnim=Math.sin(r.dwell*.15)}
      else{r.dwell=0;r.stepIdx=(r.stepIdx+1)%rowStations.length}
    }
    if(r.dwell===0){r.pos.x+=rdx*.025;r.pos.z+=rdz*.025}
    r.obj.position.set(r.pos.x,.05,r.pos.z);
    r.obj.position.y+=Math.sin(time*2.5+r.pos.x)*.02+(r.dwell>0?.02:0);
    r.obj.rotation.y=rdx>0?Math.PI/2:-Math.PI/2;
    if(r.coordSprite){updateCoordSprite(r.coordSprite,r.pos.x,r.pos.z)};
    if(r.nameSprite){r.nameSprite.sprite.position.set(r.pos.x,1.6,r.pos.z)};
  });
  
  // AGV movement — 4台各自区内巡逻
  const AGV_PATROLS=[
    [{x:-3,z:-4},{x:-3,z:-9},{x:1.5,z:-10}],         // 青A1: (150,160)→(150,210)→(195,220)
    [{x:15.5,z:-5},{x:15.5,z:-2},{x:14,z:-2},{x:14,z:3}], // 黄A2: (335,170)(335,140)(320,140)(320,90)
    [{x:-6,z:6},{x:2,z:6},{x:0,z:6}],               // 粉A3: MOD上边界 (120,60)(200,60)(180,60)
    [{x:-7,z:2.5},{x:2,z:-2.5},{x:4.5,z:-2.5},{x:-5.5,z:2.5}], // 橙A4 (110,95)(200,145)(225,145)(125,95) (110,95)(110,145)(125,145)(125,95): (110,95)(110,165)(125,165)(110,165)
  ];
  agvObjs.forEach((a,i)=>{
    const path=AGV_PATROLS[i];
    const idx=Math.floor(time*0.25)%path.length;
    a.target=path[idx];
    const adx=a.target.x-a.pos.x,adz=a.target.z-a.pos.z;
    a.pos.x+=adx*.03;a.pos.z+=adz*.03;
    a.obj.position.set(a.pos.x,.03,a.pos.z);
    if(a.nameSprite){a.nameSprite.sprite.position.set(a.pos.x,.6,a.pos.z)};
    if(Math.abs(adx)>.05) a.obj.rotation.y=adx>0?Math.PI/2:-Math.PI/2;
    else if(Math.abs(adz)>.05) a.obj.rotation.y=adz>0?0:Math.PI;
  });
  
  // Station lights
  stationObjects.forEach(s=>{
    const lt=s.children[4];
    if(lt)lt.scale.setScalar(1+Math.sin(time*3+s.position.x)*.2);
  });
  
  renderer.render(scene,camera);
}

buildFactory();
updateCam();
animate();
window.addEventListener("resize",()=>{
  renderer.setSize(wrap.clientWidth,wrap.clientHeight);
  camera.aspect=wrap.clientWidth/wrap.clientHeight;camera.updateProjectionMatrix();
});
</script>
</body>
</html>
