<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>下载离线包 · Z-MAX</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#06080d;color:#c8d1d9;text-align:center;padding:60px 20px}
h1{color:#00d4aa;font-size:24px;margin-bottom:8px}
p{color:#8b949e;font-size:13px;margin-bottom:24px}
.bar{background:#0d1117;border:1px solid #1a1f2b;border-radius:8px;width:300px;height:6px;margin:0 auto 16px;overflow:hidden}
.bar-inner{background:#00d4aa;height:100%;width:0%;transition:width .3s}
.log{max-width:500px;margin:16px auto;text-align:left;font-size:11px;color:#8b949e;line-height:1.8}
.log .ok{color:#00d4aa}.log .err{color:#ff4444}
.btn{display:inline-block;padding:12px 28px;background:#00d4aa;color:#06080d;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;margin-top:12px;cursor:pointer}
.btn:hover{opacity:.9}
</style>
</head>
<body>
<h1>📦 正在生成离线包...</h1>
<p>请稍候，正在拉取全部页面</p>
<div class="bar"><div class="bar-inner" id="bar"></div></div>
<div class="log" id="log"></div>
<script>
var pages=[
  ['主页','index.html'],
  ['算力指标','performance.html'],
  ['工厂调研','survey.html'],
  ['Orin管线','orin-pipeline.html'],
  ['系统接口','system-interfaces.html'],
  ['复盘','retrospective.html'],
  ['验收','acceptance.html'],
  ['恢复指南','recovery.html']
];
var loaded={};
var count=0;

function log(msg,cls){var d=document.getElementById('log');d.innerHTML+='<div class="'+cls+'">'+msg+'</div>';document.getElementById('bar').style.width=((++count)/pages.length*100)+'%';}

function buildOffline(){
  var h='<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Z-MAX 离线包</title><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#06080d;color:#c8d1d9}.tab-bar{display:flex;flex-wrap:wrap;gap:4px;padding:12px 16px;background:#0d1117;border-bottom:1px solid #1a1f2b;position:sticky;top:0;z-index:100}.tab{background:transparent;border:1px solid #1a1f2b;color:#8b949e;padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;white-space:nowrap;transition:.2s}.tab:hover{background:#00d4aa11;border-color:#00d4aa44;color:#00d4aa}.tab.active{background:#00d4aa22;border-color:#00d4aa;color:#00d4aa}.content{display:none;padding:0}.content.active{display:block}iframe{width:100%;height:calc(100vh - 70px);border:none;background:#06080d}</style></head><body><div class="tab-bar">';
  var bars='',contents='';
  pages.forEach(function(p,i){
    bars+='<div class="tab'+(i===0?' active':'')+'" onclick="switchTab(this,\\'tab'+i+'\\')">'+p[0]+'</div>';
    contents+='<div id="tab'+i+'" class="content'+(i===0?' active':'')+'"><iframe src="about:blank" data-src="'+btoa(unescape(encodeURIComponent(loaded[p[0]])))+'"></iframe></div>';
  });
  h+=bars+'</div>'+contents;
  h+='<script>function switchTab(tab,id){document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active")});tab.classList.add("active");document.querySelectorAll(".content").forEach(function(c){c.classList.remove("active")});var el=document.getElementById(id);el.classList.add("active");var iframe=el.querySelector("iframe");if(iframe&&iframe.src==="about:blank"){iframe.srcdoc=atob(iframe.getAttribute("data-src"));iframe.src="about:srcdoc"}}<\/script></body></html>';

  var blob=new Blob([h],{type:'text/html'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Z-MAX-离线包.html';a.click();
  log('✅ 下载已开始！','ok');
  log('📄 文件: Z-MAX-离线包.html','ok');
  log('双击打开即可离线浏览全部页面','ok');
}

function fetchPage(name,url){
  var x=new XMLHttpRequest();
  x.open('GET',url,true);
  x.onload=function(){
    if(x.status===200){
      loaded[name]=x.responseText;
      log('✅ '+name,'ok');
    }else{
      log('❌ '+name+' ('+x.status+')','err');
    }
    if(Object.keys(loaded).length===pages.length){buildOffline()}
  };
  x.onerror=function(){
    log('❌ '+name+' (网络错误)','err');
    loaded[name]='<p>加载失败</p>';
    if(Object.keys(loaded).length===pages.length){buildOffline()}
  };
  x.send();
}

pages.forEach(function(p){fetchPage(p[0],p[1])});
</script>
</body>
</html>
