<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ComfyUI Node Editor · Z-MAX</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a0f;color:#c8d1d9;overflow:hidden;height:100vh}
#toolbar{position:fixed;top:0;left:0;right:0;height:40px;background:#111;display:flex;align-items:center;padding:0 12px;gap:8px;z-index:100;border-bottom:1px solid #222}
#toolbar .btn{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none}
.btn-r{background:#ff4444;color:#fff}.btn-g{background:#00d4aa;color:#000}.btn-b{background:#58a6ff;color:#fff}
#status{font-size:11px;color:#8b949e;margin-left:auto}
#sidebar{position:fixed;top:40px;left:0;bottom:0;width:180px;background:#0d0d14;border-right:1px solid #222;padding:10px;overflow-y:auto;z-index:50}
.side-node{padding:8px 10px;margin:4px 0;border-radius:6px;font-size:11px;cursor:grab;border:1px solid #333;background:#111;transition:.15s}
.side-node:hover{border-color:#00d4aa}
.side-node.nc{border-color:#a371f7;color:#a371f7}.side-node.nm{border-color:#58a6ff;color:#58a6ff}.side-node.na{border-color:#00d4aa;color:#00d4aa}
#canvas{position:fixed;top:40px;left:180px;right:0;bottom:0;overflow:hidden}
canvas{display:block}
.log-panel{position:fixed;bottom:0;left:180px;right:0;height:80px;background:#0d0d14;border-top:1px solid#222;padding:6px 10px;overflow-y:auto;font-size:10px;font-family:monospace;color:#8b949e;z-index:50}
</style>
</head>
<body>

<div id="toolbar">
<span style="color:#00d4aa;font-weight:800;font-size:14px">ComfyUI · Z-MAX</span>
<button class="btn btn-r" onclick="runWorkflow()">▶ 执行</button>
<button class="btn btn-b" onclick="clearCanvas()">🗑 清空</button>
<button class="btn btn-g" onclick="loadPreset('insert')">光模块插拔</button>
<button class="btn btn-g" onclick="loadPreset('pickplace')">取放搬运</button>
<button class="btn btn-g" onclick="loadPreset('aoi')">AOI检测</button>
<span id="status">🔴 后端离线 · SSH启动: python3 comfyui_backend.py</span>
</div>

<div id="sidebar">
<div style="font-size:11px;color:#8b949e;margin-bottom:6px">📦 条件节点</div>
<div class="side-node nc" draggable="true" data-type="condition" data-name="C004 插入条件">🟣 力控条件</div>
<div class="side-node nc" draggable="true" data-type="condition" data-name="C001 取料条件">🟣 取料条件</div>
<div class="side-node nc" draggable="true" data-type="condition" data-name="C003 预插条件">🟣 视觉定位</div>
<div style="font-size:11px;color:#8b949e;margin:10px 0 6px">🧠 模型节点</div>
<div class="side-node nm" draggable="true" data-type="model" data-name="VTLA">🔵 VTLA 触觉VLA</div>
<div class="side-node nm" draggable="true" data-type="model" data-name="ACT">🔵 ACT 动作分块</div>
<div class="side-node nm" draggable="true" data-type="model" data-name="GR00T">🔵 GR00T N1.7</div>
<div style="font-size:11px;color:#8b949e;margin:10px 0 6px">⚡ 动作节点</div>
<div class="side-node na" draggable="true" data-type="action" data-name="A04 力控插入">🟢 力控插入</div>
<div class="side-node na" draggable="true" data-type="action" data-name="A06 拔出">🟢 拔出模块</div>
<div class="side-node na" draggable="true" data-type="action" data-name="A09 AOI检测">🟢 AOI检测</div>
</div>

<div id="canvas"><canvas id="c"></canvas></div>
<div class="log-panel" id="log">📋 从左侧拖拽节点到画布，连线后点击 ▶执行</div>

<script>
var nodes=[], connections=[], dragNode=null, offsetX=0, offsetY=0, panX=0, panY=0, isPanning=false;
var canvas=document.getElementById('c'), ctx=canvas.getContext('2d');

function resize(){canvas.width=window.innerWidth-180;canvas.height=window.innerHeight-120;draw();}
window.onresize=resize;resize();

function addNode(type,name,x,y){
  var id='n'+Date.now()+Math.random();
  nodes.push({id:id,type:type,name:name,x:x||200+Math.random()*400,y:y||100+Math.random()*300,w:140,h:60});
  draw();return id;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Grid
  ctx.strokeStyle='#111';ctx.lineWidth=1;
  for(var i=0;i<canvas.width;i+=40)for(var j=0;j<canvas.height;j+=40){ctx.strokeRect(i+panX%40,j+panY%40,1,1)}
  // Connections
  connections.forEach(function(c){
    var a=nodes.find(function(n){return n.id===c.from}),b=nodes.find(function(n){return n.id===c.to});
    if(!a||!b)return;
    ctx.beginPath();ctx.strokeStyle='#00d4aa88';ctx.lineWidth=2;
    ctx.moveTo(a.x+a.w/2+panX,a.y+a.h+panY);ctx.lineTo(b.x+b.w/2+panX,b.y+panY);
    ctx.stroke();ctx.fillStyle='#00d4aa';ctx.beginPath();ctx.arc(b.x+b.w/2+panX,b.y+panY,4,0,Math.PI*2);ctx.fill();
  });
  // Nodes
  var colors={condition:'#a371f7',model:'#58a6ff',action:'#00d4aa'};
  var cn={condition:'条件',model:'模型',action:'动作'};
  nodes.forEach(function(n){
    var c=colors[n.type]||'#888';
    ctx.fillStyle='#111';ctx.strokeStyle=c;ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(n.x+panX,n.y+panY,n.w,n.h,8);ctx.fill();ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.fillText(n.name,n.x+panX+8,n.y+panY+22);
    ctx.fillStyle=c;ctx.font='9px monospace';ctx.fillText(cn[n.type]||'?',n.x+panX+8,n.y+panY+40);
    // Port (bottom)
    ctx.fillStyle=c;ctx.beginPath();ctx.arc(n.x+n.w/2+panX,n.y+n.h+panY,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(n.x+n.w/2+panX,n.y+n.h+panY,2,0,Math.PI*2);ctx.fill();
    // Port (top)
    ctx.fillStyle=c;ctx.beginPath();ctx.arc(n.x+n.w/2+panX,n.y+panY,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(n.x+n.w/2+panX,n.y+panY,2,0,Math.PI*2);ctx.fill();
  });
}

canvas.onmousedown=function(e){
  var mx=e.offsetX-panX, my=e.offsetY-panY;
  // Check port clicks
  for(var i=nodes.length-1;i>=0;i--){
    var n=nodes[i];
    var dx=mx-(n.x+n.w/2),dy1=my-n.y,dy2=my-(n.y+n.h);
    if(Math.abs(dx)<8&&Math.abs(dy1)<8){ startConnect(n.id,'top');return; }
    if(Math.abs(dx)<8&&Math.abs(dy2)<8){ startConnect(n.id,'bottom');return; }
    if(mx>n.x&&mx<n.x+n.w&&my>n.y&&my<n.y+n.h){ dragNode=n;offsetX=mx-n.x;offsetY=my-n.y;return; }
  }
  isPanning=true;offsetX=e.offsetX-panX;offsetY=e.offsetY-panY;
};

var connectFrom=null,connectPort=null;
function startConnect(id,port){connectFrom=id;connectPort=port;}

canvas.onmouseup=function(e){
  if(connectFrom){
    var mx=e.offsetX-panX, my=e.offsetY-panY;
    for(var i=0;i<nodes.length;i++){
      var n=nodes[i];
      if(n.id===connectFrom)continue;
      var dx=mx-(n.x+n.w/2),dy=my-n.y;
      if(Math.abs(dx)<15&&Math.abs(dy)<15){
        if(connectPort==='bottom') connections.push({from:connectFrom,to:n.id});
        else connections.push({from:n.id,to:connectFrom});
        break;
      }
    }
    connectFrom=null;draw();
  }
  dragNode=null;isPanning=false;
};

canvas.onmousemove=function(e){
  if(dragNode){dragNode.x=e.offsetX-panX-offsetX;dragNode.y=e.offsetY-panY-offsetY;draw();}
  if(isPanning){panX=e.offsetX-offsetX;panY=e.offsetY-offsetY;draw();}
  if(connectFrom){draw();ctx.beginPath();ctx.strokeStyle='#fff';ctx.setLineDash([4,4]);
    var n=nodes.find(function(nn){return nn.id===connectFrom});
    ctx.moveTo(n.x+n.w/2+panX,connectPort==='bottom'?n.y+n.h+panY:n.y+panY);
    ctx.lineTo(e.offsetX,e.offsetY);ctx.stroke();ctx.setLineDash([])}
};

var sidebar=document.getElementById('sidebar');
sidebar.ondragstart=function(e){e.dataTransfer.setData('text/plain',e.target.dataset.type+'|'+e.target.dataset.name)};
canvas.ondragover=function(e){e.preventDefault()};
canvas.ondrop=function(e){e.preventDefault();
  var d=e.dataTransfer.getData('text/plain').split('|');
  addNode(d[0],d[1],e.offsetX-panX-70,e.offsetY-panY-30);
};

function log(m){var l=document.getElementById('log');l.innerText+='\n'+new Date().toLocaleTimeString()+' '+m;l.scrollTop=l.scrollHeight}

function runWorkflow(){
  if(nodes.length===0){log('⚠️ 请先拖拽节点到画布');return}
  log('▶️ 执行工作流 · '+nodes.length+'节点 · '+connections.length+'连线');
  fetch('/api/comfy/status').then(r=>r.json()).then(function(d){
    log('🟢 后端在线 · GPU:'+d.gpu);
    var body=JSON.stringify({type:'custom',nodes:nodes.map(function(n){return n.name}),connections:connections});
    fetch('/api/comfy/task',{method:'POST',headers:{'Content-Type':'application/json'},body:body})
      .then(r=>r.json()).then(function(t){log('✅ 任务:'+t.id+' · '+t.steps.length+'步')})
      .catch(function(){log('❌ 后端错误')});
  }).catch(function(){
    log('❌ 后端离线 · SSH到4090: python3 comfyui_backend.py');
    document.getElementById('status').innerHTML='🔴 离线';
  });
}

function clearCanvas(){nodes=[];connections=[];draw();log('🗑 清空')}

function loadPreset(type){
  clearCanvas();
  var presets={
    insert:[{type:'condition',name:'C004 力控条件',x:50,y:150},{type:'model',name:'VTLA',x:250,y:150},{type:'action',name:'A04 力控插入',x:450,y:150}],
    pickplace:[{type:'condition',name:'C001 取料条件',x:50,y:150},{type:'model',name:'ACT',x:250,y:150},{type:'action',name:'A01 取料动作',x:450,y:150}],
    aoi:[{type:'condition',name:'C008 检测条件',x:50,y:150},{type:'model',name:'VTLA',x:250,y:150},{type:'action',name:'A09 AOI检测',x:450,y:150}]
  };
  var p=presets[type]||presets.insert;
  var ids=p.map(function(pp){return addNode(pp.type,pp.name,pp.x,pp.y)});
  for(var i=0;i<ids.length-1;i++)connections.push({from:ids[i],to:ids[i+1]});
  draw();log('📋 加载预设: '+type);
}

// Backend check
fetch('/api/comfy/status').then(r=>r.json()).then(function(d){
  document.getElementById('status').innerHTML='🟢 在线 · GPU:'+d.gpu+' · VTLA:'+(d.vtla_online?'在线':'离线');
}).catch(function(){
  document.getElementById('status').innerHTML='🔴 后端离线 · SSH: cd /root/lerobot-smolvla-lew && python3.12 comfyui_backend.py';
});
</script>
</body>
</html>
